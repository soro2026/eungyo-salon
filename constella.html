<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EG콘스텔라티오 — 교양의 별자리</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #C9A84C;
  --gold-l: #E9C97E;
  --gold-dim: rgba(201,168,76,0.4);
  --chalk: #F0EBE0;
  --ink: #050810;
  --star-1: #fff8e7;   /* 1등급 — 가장 밝음 */
  --star-9: rgba(255,248,231,0.15); /* 9등급 — 희미 */
}

html, body {
  width: 100%; height: 100%;
  background: var(--ink);
  overflow: hidden;
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  color: var(--chalk);
  user-select: none;
}

/* ── 배경 우주 레이어 ── */
#sky {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(201,168,76,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(100,80,180,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, #0a0d1a 0%, #050810 100%);
  z-index: 0;
}

/* 은하수 + 성운 */
#nebula {
  position: fixed; inset: 0; z-index: 1;
  background:
    linear-gradient(
      125deg,
      transparent 0%, transparent 20%,
      rgba(180,160,255,0.07) 28%,
      rgba(201,168,76,0.055) 35%,
      rgba(220,200,255,0.09) 42%,
      rgba(180,160,255,0.055) 50%,
      transparent 58%, transparent 100%
    ),
    linear-gradient(
      125deg,
      transparent 0%, transparent 30%,
      rgba(255,240,200,0.045) 34%,
      rgba(255,248,220,0.075) 38%,
      rgba(255,240,200,0.045) 42%,
      transparent 46%, transparent 100%
    ),
    radial-gradient(ellipse 55% 25% at 18% 38%, rgba(201,168,76,0.05) 0%, transparent 100%),
    radial-gradient(ellipse 35% 45% at 78% 28%, rgba(120,100,200,0.065) 0%, transparent 100%),
    radial-gradient(ellipse 40% 30% at 60% 70%, rgba(100,140,200,0.045) 0%, transparent 100%);
  pointer-events: none;
}

/* ── 캔버스 (별 렌더링) ── */
#starCanvas {
  position: fixed; inset: 0; z-index: 2;
  cursor: crosshair;
}

/* ── 헤더 ── */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 52px 20px 16px;
  background: linear-gradient(to bottom, rgba(5,8,16,0.9) 0%, transparent 100%);
}
.back-btn {
  background: none; border: none;
  color: rgba(201,168,76,0.6); font-size: 18px;
  cursor: pointer; padding: 4px 8px;
}
.header-title {
  font-size: 11px; letter-spacing: 0.22em;
  color: rgba(201,168,76,0.7); font-weight: 400;
}
/* 우주 전환 버튼 */
.universe-toggle {
  display: flex; gap: 6px;
}
.toggle-btn {
  font-size: 9px; letter-spacing: 0.1em;
  padding: 5px 10px; border-radius: 20px;
  border: 1px solid rgba(201,168,76,0.25);
  background: none; color: rgba(201,168,76,0.4);
  cursor: pointer; transition: all 0.3s;
}
.toggle-btn.active {
  background: rgba(201,168,76,0.15);
  border-color: rgba(201,168,76,0.6);
  color: var(--gold);
}

/* ── 별 툴팁 ── */
#tooltip {
  position: fixed; z-index: 200;
  pointer-events: none;
  opacity: 0; transition: opacity 0.2s;
}
.tooltip-inner {
  background: rgba(5,8,16,0.92);
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 10px; padding: 10px 14px;
  backdrop-filter: blur(8px);
  white-space: nowrap;
}
.tooltip-name {
  font-size: 13px; font-weight: 600;
  color: var(--gold-l); letter-spacing: 0.06em;
  margin-bottom: 2px;
}
.tooltip-info {
  font-size: 10px; color: rgba(240,235,224,0.45);
  letter-spacing: 0.08em;
}
.tooltip-grade {
  font-size: 9px; color: rgba(201,168,76,0.5);
  margin-top: 4px; letter-spacing: 0.06em;
}

/* ── 하단 검색바 ── */
.search-wrap {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 100; padding: 16px 20px 32px;
  background: linear-gradient(to top, rgba(5,8,16,0.9) 0%, transparent 100%);
}
.search-bar {
  width: 100%; max-width: 390px; margin: 0 auto;
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 24px; padding: 10px 16px;
  backdrop-filter: blur(8px);
}
.search-icon { font-size: 14px; opacity: 0.4; }
.search-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--chalk); font-size: 13px;
  font-family: inherit;
}
.search-input::placeholder { color: rgba(240,235,224,0.25); }

/* ── 별 카운트 ── */
.star-count {
  position: fixed; bottom: 90px; right: 20px;
  z-index: 100; text-align: right;
}
.star-count-num {
  font-size: 22px; font-weight: 700;
  color: rgba(201,168,76,0.6);
  font-family: 'Courier New', monospace;
  line-height: 1;
}
.star-count-label {
  font-size: 9px; letter-spacing: 0.12em;
  color: rgba(240,235,224,0.2);
}

/* ── 소셜 우주 Coming Soon ── */
#social-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 150;
  background: rgba(5,8,16,0.92);
  flex-direction: column; align-items: center; justify-content: center;
  backdrop-filter: blur(12px);
}
#social-overlay.show { display: flex; }
.coming-soon-title {
  font-size: 15px; letter-spacing: 0.2em;
  color: rgba(100,80,200,0.8); margin-bottom: 8px;
}
.coming-soon-sub {
  font-size: 12px; color: rgba(240,235,224,0.3);
  letter-spacing: 0.1em; margin-bottom: 28px;
}
.coming-soon-btn {
  padding: 10px 24px; border-radius: 20px;
  background: none; border: 1px solid rgba(100,80,200,0.3);
  color: rgba(100,80,200,0.6); font-size: 12px;
  cursor: pointer; letter-spacing: 0.1em;
}

/* ── 별 상세 모달 ── */
#star-modal {
  display: none;
  position: fixed; inset: 0; z-index: 300;
  align-items: flex-end; justify-content: center;
  background: rgba(5,8,16,0.7);
  backdrop-filter: blur(4px);
}
#star-modal.show { display: flex; }

.modal-sheet {
  width: 100%; max-width: 480px;
  background: linear-gradient(160deg, #0d1225 0%, #080c18 100%);
  border: 1px solid rgba(201,168,76,0.2);
  border-bottom: none;
  border-radius: 24px 24px 0 0;
  padding: 28px 24px 48px;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}

.modal-handle {
  width: 40px; height: 4px;
  background: rgba(201,168,76,0.25);
  border-radius: 2px; margin: 0 auto 24px;
}

.modal-star-name {
  font-size: 22px; font-weight: 700;
  color: var(--gold-l); letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.modal-star-info {
  font-size: 12px; color: rgba(240,235,224,0.4);
  letter-spacing: 0.1em; margin-bottom: 20px;
}

/* 광도 게이지 */
.luminosity-wrap {
  margin-bottom: 20px;
}
.luminosity-label {
  font-size: 10px; letter-spacing: 0.14em;
  color: rgba(201,168,76,0.5); margin-bottom: 6px;
}
.luminosity-bar {
  display: flex; align-items: center; gap: 8px;
}
.luminosity-stars {
  font-size: 14px; letter-spacing: 2px; flex: 1;
}
.luminosity-num {
  font-size: 13px; color: var(--gold);
  font-family: 'Courier New', monospace;
}

/* 하트 섹션 (씨앗 단계) */
.heart-section {
  background: rgba(201,168,76,0.06);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 14px; padding: 16px;
  margin-bottom: 16px;
}
.heart-progress {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.heart-dots {
  display: flex; gap: 6px;
}
.heart-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.3);
  transition: all 0.3s;
}
.heart-dot.filled {
  background: rgba(201,168,76,0.6);
  border-color: var(--gold);
}
.heart-status {
  font-size: 11px; color: rgba(240,235,224,0.35);
  letter-spacing: 0.08em;
}

.btn-heart {
  width: 100%; padding: 13px;
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.35);
  border-radius: 12px; color: var(--gold-l);
  font-size: 14px; letter-spacing: 0.08em;
  cursor: pointer; transition: all 0.2s;
  font-family: inherit;
}
.btn-heart:hover { background: rgba(201,168,76,0.2); }
.btn-heart:disabled {
  opacity: 0.4; cursor: not-allowed;
}
.btn-heart.hearted {
  background: rgba(201,168,76,0.08);
  border-color: rgba(201,168,76,0.2);
  color: rgba(201,168,76,0.4);
}

/* 비상장/상장 섹션 */
.stock-section {
  background: rgba(201,168,76,0.06);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 14px; padding: 16px;
  margin-bottom: 16px;
}
.stock-row {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 8px;
}
.stock-label {
  font-size: 11px; color: rgba(240,235,224,0.35);
  letter-spacing: 0.08em;
}
.stock-value {
  font-size: 13px; color: var(--gold-l);
  font-family: 'Courier New', monospace;
}
.stock-badge {
  display: inline-block; font-size: 9px;
  letter-spacing: 0.1em; padding: 3px 8px;
  border-radius: 10px; margin-bottom: 12px;
}
.stock-badge.unlisted {
  background: rgba(100,80,200,0.15);
  border: 1px solid rgba(100,80,200,0.3);
  color: rgba(180,160,255,0.7);
}
.stock-badge.listed {
  background: rgba(201,168,76,0.12);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold);
}

.btn-stock {
  width: 100%; padding: 13px;
  border-radius: 12px; font-size: 14px;
  letter-spacing: 0.08em; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.btn-stock.buy {
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold-l);
}
.btn-stock.buy:hover { background: rgba(201,168,76,0.25); }

.modal-close {
  width: 100%; padding: 11px;
  background: none; border: 1px solid rgba(240,235,224,0.1);
  border-radius: 12px; color: rgba(240,235,224,0.3);
  font-size: 13px; cursor: pointer;
  font-family: inherit; letter-spacing: 0.08em;
}
</style>
</head>
<body>

<div id="sky"></div>
<div id="nebula"></div>
<canvas id="starCanvas"></canvas>

<!-- 헤더 -->
<div class="header">
  <button class="back-btn" onclick="goHome()">←</button>
  <div class="header-title">E G  C O N S T E L L A T I O</div>
  <div class="universe-toggle">
    <button class="toggle-btn active" id="btn-culture" onclick="showCultureUniverse()">교양우주</button>
    <button class="toggle-btn" id="btn-social" onclick="showSocialUniverse()">소셜우주</button>
  </div>
</div>

<!-- 별 툴팁 -->
<div id="tooltip">
  <div class="tooltip-inner">
    <div class="tooltip-name" id="tt-name">소크라테스</div>
    <div class="tooltip-info" id="tt-info">철학 · 고대 그리스</div>
    <div class="tooltip-grade" id="tt-grade">★ 5등급 · 북마크 127명</div>
  </div>
</div>

<!-- 별 카운트 -->
<div class="star-count">
  <div class="star-count-num" id="star-count-num">0</div>
  <div class="star-count-label">별</div>
</div>

<!-- 소셜 우주 Coming Soon -->
<div id="social-overlay">
  <div class="coming-soon-title">S O C I A L  U N I V E R S E</div>
  <div class="coming-soon-sub">추천 연결망 우주 — 준비 중입니다</div>
  <button class="coming-soon-btn" onclick="showCultureUniverse()">← 교양우주로</button>
</div>

<!-- 별 상세 모달 -->
<div id="star-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>

    <div class="modal-star-name" id="modal-name">카프카</div>
    <div class="modal-star-info" id="modal-info">문학 · 1883 ~ 1924</div>

    <!-- 광도 -->
    <div class="luminosity-wrap">
      <div class="luminosity-label">L U M I N O S I T Y</div>
      <div class="luminosity-bar">
        <div class="luminosity-stars" id="modal-luminosity-bar">✦✦✦✦✦✦✧✧✧✧</div>
        <div class="luminosity-num" id="modal-luminosity-num">6.2</div>
      </div>
    </div>

    <!-- 씨앗 단계 -->
    <div id="section-seed">
      <div class="heart-section">
        <div class="heart-progress">
          <div class="heart-dots" id="heart-dots">
            <div class="heart-dot"></div>
            <div class="heart-dot"></div>
            <div class="heart-dot"></div>
          </div>
          <div class="heart-status" id="heart-status">3개의 하트가 모이면 별이 깨어납니다</div>
        </div>
        <button class="btn-heart" id="btn-heart" onclick="sendHeart()">
          ♡ 하트 보내기
        </button>
      </div>
    </div>

    <!-- 비상장 단계 -->
    <div id="section-unlisted" style="display:none">
      <div class="stock-section">
        <div class="stock-badge unlisted">🔒 비상장</div>
        <div class="stock-row">
          <span class="stock-label">잔여 주식</span>
          <span class="stock-value" id="modal-stock-remain">— 주</span>
        </div>
        <div class="stock-row">
          <span class="stock-label">현재가</span>
          <span class="stock-value" id="modal-stock-price">— 알</span>
        </div>
        <div class="stock-row">
          <span class="stock-label">주주 수</span>
          <span class="stock-value" id="modal-stock-holders">— 명</span>
        </div>
        <div class="stock-row">
          <span class="stock-label">예상 IPO 배수</span>
          <span class="stock-value" id="modal-ipo-est">— 배</span>
        </div>
      </div>
      <button class="btn-stock buy" onclick="buyStock()">🔒 주식 매입하기 (준비 중)</button>
    </div>

    <!-- 상장 단계 -->
    <div id="section-listed" style="display:none">
      <div class="stock-section">
        <div class="stock-badge listed">✦ 상장</div>
        <div class="stock-row">
          <span class="stock-label">현재 주가</span>
          <span class="stock-value" id="modal-listed-price">— 알</span>
        </div>
        <div class="stock-row">
          <span class="stock-label">주주 수</span>
          <span class="stock-value" id="modal-listed-holders">— 명</span>
        </div>
        <div class="stock-row">
          <span class="stock-label">시가총액</span>
          <span class="stock-value" id="modal-market-cap">— 알</span>
        </div>
      </div>
      <button class="btn-stock buy" onclick="buyStock()">매수 / 매도 (준비 중)</button>
    </div>

    <br>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<!-- 하단 검색바 -->
<div class="search-wrap">
  <div class="search-bar">
    <span class="search-icon">🔭</span>
    <input class="search-input" type="text" placeholder="인물 이름으로 별 찾기..."
      oninput="searchStar(this.value)">
  </div>
</div>

<script>
// ── Supabase 초기화 ───────────────────────────────────────────────
const SUPA_URL = 'https://cyhlotwdisjvoxvfkpnd.supabase.co';
const SUPA_KEY = 'sb_publishable_jYYfQV_wQgMRFjSUuDq7xA_gWc9vsnR';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY, {
  auth: { autoRefreshToken: true, persistSession: true, storageKey: 'eungyo-auth' }
});

let currentUser = null;
let myHearts = new Set(); // 내가 하트 준 star_id 목록
let currentStarData = null; // 현재 모달에 열린 별 데이터

// ── 인증 초기화 ───────────────────────────────────────────────────
async function initAuth() {
  const { data: { session } } = await supa.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadMyHearts();
  }
}

// 내 하트 목록 로드
async function loadMyHearts() {
  if (!currentUser) return;
  const { data } = await supa.from('hearts')
    .select('star_id')
    .eq('user_id', currentUser.id);
  if (data) data.forEach(r => myHearts.add(r.star_id));
}

// ── 별 데이터 (Supabase stars 연동) ─────────────────────────────
let FIGURES = []; // DB에서 로드

async function loadStars() {
  const { data, error } = await supa.from('stars').select('*').order('grade');
  if (error) { console.error('stars 로드 실패:', error); return; }
  FIGURES = data.map(s => ({
    id: s.id,
    name: s.name,
    field: s.field,
    birth: s.birth,
    death: s.death,
    grade: s.grade,
    heart_count: s.heart_count,
    luminosity: s.luminosity,
    stock_status: s.stock_status,
    has_content: s.has_content,
    // 툴팁용
    info: `${s.field} · ${s.birth < 0 ? 'BC ' + Math.abs(s.birth) : s.birth}`,
    bookmarks: s.heart_count,
  }));
  document.getElementById('star-count-num').textContent = FIGURES.length;
  resize(); // 별 다시 배치
}

// ── 광도 게이지 렌더 ─────────────────────────────────────────────
function renderLuminosity(lum) {
  const filled = Math.round(lum);
  const bar = '✦'.repeat(Math.min(filled, 10)) + '✧'.repeat(Math.max(0, 10 - filled));
  return bar;
}

// ── 별 클릭 → 모달 열기 ─────────────────────────────────────────
function openStarModal(fig) {
  currentStarData = fig;

  // 기본 정보
  document.getElementById('modal-name').textContent = fig.name;
  const birthStr = fig.birth < 0 ? 'BC ' + Math.abs(fig.birth) : fig.birth;
  const deathStr = fig.death < 0 ? 'BC ' + Math.abs(fig.death) : fig.death;
  document.getElementById('modal-info').textContent =
    `${fig.field} · ${birthStr} ~ ${deathStr}`;

  // 광도
  const lum = fig.luminosity || 0;
  document.getElementById('modal-luminosity-bar').textContent = renderLuminosity(lum);
  document.getElementById('modal-luminosity-num').textContent = lum.toFixed(1);

  // 단계별 섹션 표시
  document.getElementById('section-seed').style.display = 'none';
  document.getElementById('section-unlisted').style.display = 'none';
  document.getElementById('section-listed').style.display = 'none';

  if (fig.stock_status === 'seed') {
    document.getElementById('section-seed').style.display = 'block';
    renderHeartSection(fig);
  } else if (fig.stock_status === 'unlisted') {
    document.getElementById('section-unlisted').style.display = 'block';
    renderUnlistedSection(fig);
  } else if (fig.stock_status === 'listed') {
    document.getElementById('section-listed').style.display = 'block';
    renderListedSection(fig);
  }

  document.getElementById('star-modal').classList.add('show');
}

function renderHeartSection(fig) {
  const heartCount = fig.heart_count || 0;
  const dots = document.getElementById('heart-dots');
  dots.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'heart-dot' + (i < heartCount ? ' filled' : '');
    dots.appendChild(dot);
  }
  const status = heartCount >= 3
    ? '별이 깨어났습니다 🌟'
    : `${3 - heartCount}개의 하트가 더 필요합니다`;
  document.getElementById('heart-status').textContent = status;

  const btn = document.getElementById('btn-heart');
  const alreadyHearted = myHearts.has(fig.id);
  if (alreadyHearted) {
    btn.textContent = '♥ 하트를 보냈습니다';
    btn.classList.add('hearted');
    btn.disabled = true;
  } else {
    btn.textContent = '♡ 하트 보내기';
    btn.classList.remove('hearted');
    btn.disabled = !currentUser;
  }
}

function renderUnlistedSection(fig) {
  // 더미 스톡 데이터 (스톡 시스템 구현 전)
  document.getElementById('modal-stock-remain').textContent = '— 주';
  document.getElementById('modal-stock-price').textContent = '— 알';
  document.getElementById('modal-stock-holders').textContent = '— 명';

async function sendHeart() {
  if (!currentUser) { alert('로그인이 필요합니다.'); return; }
  if (!currentStarData) return;
  if (myHearts.has(currentStarData.id)) return;

  const btn = document.getElementById('btn-heart');
  btn.disabled = true;
  btn.textContent = '♥ 보내는 중...';

  // hearts 테이블에 INSERT
  const { error: heartErr } = await supa.from('hearts').insert({
    user_id: currentUser.id,
    star_id: currentStarData.id,
  });

  if (heartErr) {
    console.error('하트 오류:', heartErr);
    btn.disabled = false;
    btn.textContent = '♡ 하트 보내기';
    return;
  }

  // stars heart_count +1
  await supa.from('stars')
    .update({ heart_count: (currentStarData.heart_count || 0) + 1 })
    .eq('id', currentStarData.id);

  // 로컬 업데이트
  myHearts.add(currentStarData.id);
  currentStarData.heart_count = (currentStarData.heart_count || 0) + 1;
  const fig = FIGURES.find(f => f.id === currentStarData.id);
  if (fig) { fig.heart_count = currentStarData.heart_count; fig.bookmarks = fig.heart_count; }

  renderHeartSection(currentStarData);
}

// ── 별 객체 ──────────────────────────────────────────────────────
let animFrame = null;
let shootingStars = [];
let tooltip = document.getElementById('tooltip');
let hoveredStar = null;
let searchQuery = '';

// ── Canvas 초기화 ────────────────────────────────────────────────
const canvas = document.getElementById('starCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  initStars();
}

function initStars() {
  stars = [];
  const W = canvas.width;
  const H = canvas.height;

  // 배경 미세 별 (장식용) — 랜덤 200개
  for (let i = 0; i < 200; i++) {
    stars.push({
      type: 'bg',
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 0.8 + 0.2,
      alpha: Math.random() * 0.3 + 0.05,
      twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinklePhase: Math.random() * Math.PI * 2,
    });
  }

  // 인물 별 — FIGURES 배열 기반
  const margin = 80;
  const usable = { x: margin, y: 80, w: W - margin*2, h: H - 160 };

  FIGURES.forEach((fig, idx) => {
    // 겹치지 않게 배치 시도
    let x, y, attempts = 0;
    do {
      x = usable.x + Math.random() * usable.w;
      y = usable.y + Math.random() * usable.h;
      attempts++;
    } while (attempts < 30 && stars.some(s => s.type === 'figure' &&
      Math.hypot(s.x - x, s.y - y) < 40));

    const grade = fig.grade;
    const baseR = grade === 1 ? 5 : grade === 2 ? 4 : grade === 3 ? 3.2 :
                  grade === 4 ? 2.5 : grade === 5 ? 2 : 1.2;
    const baseAlpha = grade === 1 ? 1 : grade === 2 ? 0.85 : grade === 3 ? 0.7 :
                      grade === 4 ? 0.55 : grade === 5 ? 0.42 : 0.18;

    stars.push({
      type: 'figure',
      figure: fig,
      x, y,
      r: baseR,
      alpha: baseAlpha,
      baseAlpha,
      twinkleSpeed: Math.random() * 0.015 + 0.004,
      twinklePhase: Math.random() * Math.PI * 2,
      glowR: baseR * (grade <= 3 ? 10 : 6),
      highlighted: false,
    });
  });

  document.getElementById('star-count-num').textContent = FIGURES.length;
}

// ── 별 그리기 ────────────────────────────────────────────────────
function drawStar(s, t) {
  // 반짝임
  const twinkle = Math.sin(t * s.twinkleSpeed * 60 + s.twinklePhase);

  if (s.type === 'bg') {
    const a = s.alpha + twinkle * 0.05;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,248,231,${Math.max(0, a)})`;
    ctx.fill();
    return;
  }

  // 인물 별
  const fig = s.figure;
  const grade = fig.grade;
  const isFiltered = searchQuery && !fig.name.includes(searchQuery);
  if (isFiltered) return;

  const pulse = s.highlighted ? 1.4 : 1;
  const a = Math.min(1, s.baseAlpha + twinkle * 0.08) * pulse;
  const r = s.r * pulse;

  // 글로우 (1~5등급)
  if (grade <= 5) {
    const glowColor = grade <= 2
      ? `rgba(255,240,180,${a * 0.15})`
      : `rgba(201,168,76,${a * 0.1})`;
    const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.glowR * pulse);
    grad.addColorStop(0, glowColor);
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.glowR * pulse, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // 별 본체
  const starColor = grade === 9
    ? `rgba(200,210,255,${a})`
    : grade <= 2
    ? `rgba(255,248,220,${a})`
    : `rgba(240,235,200,${a})`;

  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
  ctx.fillStyle = starColor;
  ctx.fill();

  // 1~3등급 — 십자형 광선
  if (grade <= 3 && a > 0.5) {
    ctx.strokeStyle = `rgba(255,248,220,${a * 0.4})`;
    ctx.lineWidth = 0.5;
    const len = r * 4;
    ctx.beginPath();
    ctx.moveTo(s.x - len, s.y); ctx.lineTo(s.x + len, s.y);
    ctx.moveTo(s.x, s.y - len); ctx.lineTo(s.x, s.y + len);
    ctx.stroke();
  }

  // 이름 표시 — 호버된 별만
  if (s.highlighted && a > 0.3) {
    ctx.fillStyle = `rgba(240,235,200,${a * 0.85})`;
    ctx.font = `${grade <= 1 ? 12 : 11}px 'Apple SD Gothic Neo', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(fig.name, s.x, s.y - r - 7);
  }
}

// ── 별똥별 4종류 ─────────────────────────────────────────────────
const SHOOTING_TYPES = [
  // 타입 1: 빠르고 가는 황금빛 (클래식)
  { speedMin: 7, speedMax: 12, lenMin: 80, lenMax: 140, width: 1.2,
    angleMin: 15, angleMax: 35, color: [255,248,200], alpha: 0.9 },
  // 타입 2: 느리고 굵은 흰빛 (장거리)
  { speedMin: 3, speedMax: 5,  lenMin: 150, lenMax: 220, width: 2.5,
    angleMin: 20, angleMax: 40, color: [240,240,255], alpha: 0.7 },
  // 타입 3: 중간 속도, 푸른빛 (희귀)
  { speedMin: 5, speedMax: 8,  lenMin: 60, lenMax: 100, width: 1.8,
    angleMin: 30, angleMax: 55, color: [180,200,255], alpha: 0.75 },
  // 타입 4: 극도로 빠른 섬광 (찰나)
  { speedMin: 14, speedMax: 20, lenMin: 40, lenMax: 70, width: 0.8,
    angleMin: 10, angleMax: 25, color: [255,255,240], alpha: 1.0 },
];

function spawnShootingStar() {
  const W = canvas.width;
  const H = canvas.height;
  // 타입 4(섬광)는 20% 확률, 나머지는 균등
  const roll = Math.random();
  const typeIdx = roll < 0.2 ? 3 : Math.floor(Math.random() * 3);
  const t = SHOOTING_TYPES[typeIdx];

  const angleDeg = t.angleMin + Math.random() * (t.angleMax - t.angleMin);
  const angle = angleDeg * Math.PI / 180;
  const speed = t.speedMin + Math.random() * (t.speedMax - t.speedMin);
  const len   = t.lenMin + Math.random() * (t.lenMax - t.lenMin);

  // 화면 상단/좌측에서 시작
  const startEdge = Math.random() < 0.7 ? 'top' : 'left';
  const x = startEdge === 'top' ? Math.random() * W * 0.75 : Math.random() * W * 0.2;
  const y = startEdge === 'top' ? Math.random() * H * 0.35 : Math.random() * H * 0.4;

  shootingStars.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    len, width: t.width,
    color: t.color,
    alpha: t.alpha,
    life: 1,
    decay: typeIdx === 3 ? 0.06 : 0.018 + Math.random() * 0.01,
  });
}

function drawShootingStars() {
  shootingStars = shootingStars.filter(s => s.life > 0);
  shootingStars.forEach(s => {
    const tailX = s.x - s.vx * (s.len / 8);
    const tailY = s.y - s.vy * (s.len / 8);
    const [r,g,b] = s.color;

    // 꼬리 그라디언트
    const grad = ctx.createLinearGradient(s.x, s.y, tailX, tailY);
    grad.addColorStop(0, `rgba(${r},${g},${b},${s.alpha * s.life})`);
    grad.addColorStop(0.3, `rgba(${r},${g},${b},${s.alpha * s.life * 0.5})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);

    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(tailX, tailY);
    ctx.strokeStyle = grad;
    ctx.lineWidth = s.width * s.life;
    ctx.lineCap = 'round';
    ctx.stroke();

    // 헤드 글로우
    const glowGrad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.width * 3);
    glowGrad.addColorStop(0, `rgba(${r},${g},${b},${s.alpha * s.life * 0.8})`);
    glowGrad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.width * 3, 0, Math.PI * 2);
    ctx.fillStyle = glowGrad;
    ctx.fill();

    s.x += s.vx; s.y += s.vy;
    s.life -= s.decay;
  });
}

// ── 메인 루프 ────────────────────────────────────────────────────
let startTime = performance.now();
function loop() {
  const t = (performance.now() - startTime) / 1000;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => drawStar(s, t));
  drawShootingStars();
  animFrame = requestAnimationFrame(loop);
}

// 별똥별 — 8~15초 간격 랜덤
function scheduleShootingStar() {
  setTimeout(() => {
    spawnShootingStar();
    scheduleShootingStar();
  }, Math.random() * 7000 + 8000);
}

// ── 인터랙션 ─────────────────────────────────────────────────────
function getPointerPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function findNearestFigureStar(px, py, threshold = 28) {
  let nearest = null;
  let minDist = threshold;
  stars.forEach(s => {
    if (s.type !== 'figure') return;
    const d = Math.hypot(s.x - px, s.y - py);
    if (d < minDist) { minDist = d; nearest = s; }
  });
  return nearest;
}

function showTooltip(s, px, py) {
  const fig = s.figure;
  document.getElementById('tt-name').textContent = fig.name;
  document.getElementById('tt-info').textContent = fig.info;
  const gradeStr = fig.grade === 9
    ? '9등급 · 문제에서 만난 인물'
    : `${fig.grade}등급 · 북마크 ${fig.bookmarks}명`;
  document.getElementById('tt-grade').textContent =
    '★'.repeat(Math.max(1, 9 - fig.grade)) + ' ' + gradeStr;

  const tw = 180;
  let tx = px + 16;
  let ty = py - 60;
  if (tx + tw > window.innerWidth - 10) tx = px - tw - 10;
  if (ty < 80) ty = py + 20;
  tooltip.style.left = tx + 'px';
  tooltip.style.top  = ty + 'px';
  tooltip.style.opacity = '1';
}

function hideTooltip() {
  tooltip.style.opacity = '0';
}

// 마우스
canvas.addEventListener('mousemove', e => {
  const { x, y } = getPointerPos(e);
  const s = findNearestFigureStar(x, y);
  if (s !== hoveredStar) {
    if (hoveredStar) hoveredStar.highlighted = false;
    hoveredStar = s;
    if (s) { s.highlighted = true; showTooltip(s, x, y); canvas.style.cursor = 'pointer'; }
    else { hideTooltip(); canvas.style.cursor = 'crosshair'; }
  } else if (s) {
    showTooltip(s, x, y);
  }
});

canvas.addEventListener('mouseleave', () => {
  if (hoveredStar) hoveredStar.highlighted = false;
  hoveredStar = null; hideTooltip();
});

// 터치
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const { x, y } = getPointerPos(e);
  const s = findNearestFigureStar(x, y, 40);
  if (hoveredStar && hoveredStar !== s) hoveredStar.highlighted = false;
  hoveredStar = s;
  if (s) { s.highlighted = true; showTooltip(s, x, y); }
  else hideTooltip();
}, { passive: false });

// 터치 끝 — 별 클릭 → 모달
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const { x, y } = getPointerPos({ touches: e.changedTouches });
  const s = findNearestFigureStar(x, y, 40);
  if (s) { hideTooltip(); openStarModal(s.figure); }
}, { passive: false });

// 마우스 클릭 → 모달
canvas.addEventListener('click', e => {
  const { x, y } = getPointerPos(e);
  const s = findNearestFigureStar(x, y, 28);
  if (s) { hideTooltip(); openStarModal(s.figure); }
});

// ── 검색 ─────────────────────────────────────────────────────────
function searchStar(q) {
  searchQuery = q.trim();
  if (!searchQuery) return;
  // 검색된 별 하이라이트
  stars.forEach(s => {
    if (s.type !== 'figure') return;
    s.highlighted = s.figure.name.includes(searchQuery);
  });
}
