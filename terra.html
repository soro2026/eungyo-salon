<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EG테라 — 나의 교양 과수원</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #0E1A0F;
  color: #F0EBE0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── 헤더 ── */
.terra-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  position: relative;
  z-index: 10;
}
.back-btn {
  background: none;
  border: none;
  color: rgba(201,168,76,0.7);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
}
.terra-title {
  font-size: 13px;
  letter-spacing: 0.15em;
  color: rgba(201,168,76,0.8);
  font-weight: 500;
}
.apple-count-badge {
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  color: #C9A84C;
}

/* ── 나무 영역 ── */
.tree-wrap {
  position: relative;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 16px 40px;
}
.tree-img {
  width: 100%;
  display: block;
  border-radius: 16px;
}
.apple-on-tree {
  position: absolute;
  width: 48px;
  height: 48px;
  pointer-events: none;
  animation: float 3s ease-in-out infinite;
}
.apple-on-tree.locked {
  filter: grayscale(0.6) brightness(0.7);
}
@keyframes float {
  0%, 100% { transform: translateY(0px) rotate(-5deg); }
  50% { transform: translateY(-4px) rotate(3deg); }
}

/* ── 정보 카드 ── */
.info-section {
  padding: 0 20px 40px;
  max-width: 480px;
  margin: 0 auto;
}
.info-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 12px;
}
.info-card-title {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: rgba(201,168,76,0.6);
  margin-bottom: 12px;
}
.apple-stat-row {
  display: flex;
  justify-content: space-around;
  text-align: center;
}
.apple-stat {
  flex: 1;
}
.apple-stat-num {
  font-size: 26px;
  font-weight: 700;
  color: #C9A84C;
  font-family: 'Courier New', monospace;
}
.apple-stat-label {
  font-size: 11px;
  color: rgba(240,235,224,0.4);
  margin-top: 4px;
}

/* ── 황금나무 완성 오버레이 ── */
.golden-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  box-sizing: border-box;
}
.golden-overlay.show { display: flex; }
.golden-overlay video {
  width: 100%; max-width: 360px;
  border-radius: 16px;
  margin-bottom: 20px;
}
.golden-overlay-title {
  font-size: 20px; font-weight: 700;
  color: #C9A84C; letter-spacing: 0.08em;
  text-align: center; margin-bottom: 8px;
}
.golden-overlay-sub {
  font-size: 13px; color: rgba(240,235,224,0.6);
  text-align: center; margin-bottom: 24px; line-height: 1.6;
}
.golden-overlay-btn {
  width: 100%; max-width: 360px; padding: 14px;
  background: linear-gradient(135deg, rgba(201,168,76,0.4), rgba(201,168,76,0.15));
  border: 1px solid rgba(201,168,76,0.6);
  border-radius: 10px; color: #C9A84C;
  font-size: 14px; letter-spacing: 0.1em; cursor: pointer;
}

/* ── 로딩 ── */
.loading-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: rgba(240,235,224,0.4);
  font-size: 13px;
  gap: 12px;
}
.loading-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(201,168,76,0.5);
  animation: pulse 1.2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

/* ── 빈 상태 ── */
.empty-wrap {
  text-align: center;
  padding: 40px 20px;
}
.empty-msg {
  font-size: 14px;
  color: rgba(240,235,224,0.4);
  line-height: 1.7;
  margin-bottom: 8px;
}
.empty-sub {
  font-size: 12px;
  color: rgba(240,235,224,0.25);
}

/* ── 안내 텍스트 ── */
.guide-text {
  text-align: center;
  font-size: 12px;
  color: rgba(240,235,224,0.3);
  padding: 12px 20px 0;
  line-height: 1.6;
}
</style>
</head>
<body>

<div class="terra-header">
  <button class="back-btn" onclick="goHome()">←</button>
  <div class="terra-title">E G  T E R R A</div>
  <div class="apple-count-badge" id="header-count">🍎 0</div>
</div>

<!-- ── 황금나무 완성 오버레이 ── -->
<div class="golden-overlay" id="golden-overlay">
  <video id="golden-video" playsinline>
    <source src="terra_golden_complete.mp4" type="video/mp4">
  </video>
  <div class="golden-overlay-title">🌳 황금 과수원 완성!</div>
  <div class="golden-overlay-sub">10알의 교양이 황금빛 과수원을<br>아름답게 물들였습니다 ✨</div>
  <button class="golden-overlay-btn" onclick="closeGoldenOverlay()">
    🍎 새로운 나무를 심으러 가기
  </button>
</div>

<div id="loading-state" class="loading-wrap">
  <div class="loading-dot"></div>
  <span>과수원을 불러오는 중...</span>
</div>

<div id="main-content" style="display:none">
  <div class="tree-wrap">
    <img class="tree-img" src="terra_seedling.png" alt="황금사과나무" id="tree-img">
  </div>

  <div style="display:flex;justify-content:flex-end;align-items:center;gap:6px;padding:8px 20px;min-height:52px;" id="mini-trees-wrap"></div>

  <div class="guide-text" id="guide-text"></div>

  <div class="info-section">
    <div class="info-card">
      <div class="info-card-title">▲ 나의 황금사과 현황</div>
      <div class="apple-stat-row">
        <div class="apple-stat">
          <div class="apple-stat-num" id="stat-total">0</div>
          <div class="apple-stat-label">총 사과</div>
        </div>
        <div class="apple-stat">
          <div class="apple-stat-num" id="stat-available">0</div>
          <div class="apple-stat-label">사용 가능</div>
        </div>
        <div class="apple-stat">
          <div class="apple-stat-num" id="stat-locked">0</div>
          <div class="apple-stat-label">경매 사용</div>
        </div>
      </div>
    </div>

    <div class="info-card" id="empty-card" style="display:none">
      <div class="empty-wrap">
        <div class="empty-msg">아직 과수원에 사과가 없어요.<br>경기에서 승리하면 황금사과를 받을 수 있어요!</div>
        <div class="empty-sub">EG스타디움에서 첫 승리를 거둬보세요 ⚾</div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPA_URL = 'https://cyhlotwdisjvoxvfkpnd.supabase.co';
const SUPA_KEY = 'sb_publishable_jYYfQV_wQgMRFjSUuDq7xA_gWc9vsnR';

function showGoldenOverlay() {
  const overlay = document.getElementById('golden-overlay');
  const video = document.getElementById('golden-video');
  overlay.classList.add('show');
  video.currentTime = 0;
  video.play().catch(() => {});
  // 영상 끝나면 자동으로 닫기 안 함 — 버튼으로만 닫기
}

function closeGoldenOverlay() {
  const overlay = document.getElementById('golden-overlay');
  const video = document.getElementById('golden-video');
  video.pause();
  overlay.classList.remove('show');
}

function goHome() {
  window.location.href = '/eungyo-salon/';
}

async function getSession() {
  try {
    const stored = localStorage.getItem('sb-cyhlotwdisjvoxvfkpnd-auth-token')
      || localStorage.getItem('eungyo-auth');
    if (stored) {
      const parsed = JSON.parse(stored);
      return parsed?.access_token || parsed?.session?.access_token || null;
    }
  } catch(e) {}
  return null;
}

async function fetchApples(userId, token) {
  const res = await fetch(
    `${SUPA_URL}/rest/v1/apple_log?uid=eq.${userId}&order=created_at.asc`,
    {
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      }
    }
  );
  if (!res.ok) throw new Error('fetch failed');
  return res.json();
}

async function getCurrentUser(token) {
  const res = await fetch(`${SUPA_URL}/auth/v1/user`, {
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': `Bearer ${token}`
    }
  });
  if (!res.ok) throw new Error('auth failed');
  return res.json();
}

// ── 성장 단계 설정 ──────────────────────────────
const TREE_STAGES = [
  { img: 'terra_seedling.png', min: 0, max: 3, label: '묘목이 자라고 있어요 🌱',
    zones: [
      { x: 42, y: 38 }, { x: 55, y: 32 }, { x: 65, y: 40 },
    ]
  },
  { img: 'terra_sapling.png', min: 4, max: 6, label: '작은 나무가 열매를 맺기 시작했어요 🌿',
    zones: [
      { x: 38, y: 38 }, { x: 55, y: 32 }, { x: 68, y: 40 },
      { x: 30, y: 50 }, { x: 50, y: 46 }, { x: 65, y: 52 },
    ]
  },
  { img: 'terra_tree.png', min: 7, max: 9, label: '과수원이 점점 풍성해지고 있어요 🍎',
    zones: [
      { x: 35, y: 38 }, { x: 50, y: 32 }, { x: 65, y: 38 },
      { x: 25, y: 48 }, { x: 45, y: 44 }, { x: 62, y: 50 },
      { x: 75, y: 42 }, { x: 38, y: 55 }, { x: 58, y: 55 },
    ]
  },
  { img: 'terra_golden_tree.png', min: 10, max: 999, label: '황금 과수원이 완성되었습니다! ✨',
    zones: [
      { x: 30, y: 18 }, { x: 45, y: 13 }, { x: 58, y: 10 },
      { x: 70, y: 18 }, { x: 22, y: 28 }, { x: 38, y: 25 },
      { x: 55, y: 22 }, { x: 68, y: 30 }, { x: 28, y: 38 },
      { x: 52, y: 35 },
    ]
  },
];

function getStage(count) {
  return TREE_STAGES.find(s => count <= s.max) || TREE_STAGES[3];
}

function placeApples(apples) {
  const treeWrap = document.querySelector('.tree-wrap');
  const treeImg = document.getElementById('tree-img');

  // 현재 단계 결정
  const currentCount = apples.filter(a => !a.locked).length;
  // 완성된 나무 수 (10알 단위)
  const completedTrees = Math.floor(apples.length / 10);
  // 현재 나무에 달린 사과 (10알 이후 나머지)
  const currentApples = apples.length % 10 || (apples.length > 0 && apples.length % 10 === 0 ? 10 : 0);
  const displayCount = currentApples === 10 ? 10 : currentApples;

  const stage = getStage(displayCount);

  // 10알 완성 — 팡파레 영상 표시 (첫 진입 시만)
  if (displayCount === 10 && completedTrees === Math.floor(apples.length / 10)) {
    // sessionStorage로 이미 봤는지 체크
    const key = `golden_shown_${completedTrees}`;
    if (!sessionStorage.getItem(key)) {
      sessionStorage.setItem(key, '1');
      setTimeout(() => showGoldenOverlay(), 500);
    }
  }

  // 나무 이미지 교체
  treeImg.src = stage.img;

  // 안내 텍스트 업데이트
  document.getElementById('guide-text').textContent = stage.label;

  // 기존 사과 + 미니 나무 제거
  treeWrap.querySelectorAll('.apple-on-tree, .mini-tree').forEach(el => el.remove());

  // 완성된 나무 미니 썸네일 (오른쪽에 쌓기)
  const miniWrap = document.getElementById('mini-trees-wrap');
  miniWrap.innerHTML = '';
  for (let i = 0; i < completedTrees; i++) {
    const mini = document.createElement('img');
    mini.src = 'terra_golden_mini.png';
    mini.style.cssText = 'width:44px;height:44px;object-fit:contain;';
    mini.title = `${i+1}번째 황금 과수원`;
    miniWrap.appendChild(mini);
  }

  // 사과 배치
  const zones = stage.zones;
  const showCount = Math.min(displayCount, zones.length);

  for (let i = 0; i < showCount; i++) {
    const zone = zones[i];
    const apple = apples[i] || { locked: false };
    const img = document.createElement('img');
    img.src = 'terra_apple.png';
    img.className = 'apple-on-tree' + (apple.locked ? ' locked' : '');

    const offsetX = (Math.random() - 0.5) * 3;
    const offsetY = (Math.random() - 0.5) * 3;
    const delay = (Math.random() * 2).toFixed(1);
    const size = 30 + Math.floor(Math.random() * 6);

    img.style.position = 'absolute';
    img.style.width = size + 'px';
    img.style.height = size + 'px';
    img.style.animationDelay = delay + 's';
    img.style.animationDuration = (2.5 + Math.random()).toFixed(1) + 's';

    const setPos = () => {
      const iw = treeImg.offsetWidth;
      const ih = treeImg.offsetHeight;
      const it = treeImg.offsetTop;
      const il = treeImg.offsetLeft;
      const left = il + iw * (zone.x + offsetX) / 100 - size / 2;
      const top  = it + ih * (zone.y + offsetY) / 100 - size / 2;
      img.style.left = left + 'px';
      img.style.top  = top + 'px';
    };

    if (treeImg.complete) setPos();
    else treeImg.addEventListener('load', setPos);

    treeWrap.appendChild(img);
  }
}

function updateStats(apples) {
  const total = apples.length;
  const locked = apples.filter(a => a.locked).length;
  const available = total - locked;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-available').textContent = available;
  document.getElementById('stat-locked').textContent = locked;
  document.getElementById('header-count').textContent = '🍎 ' + total;

  // 안내 텍스트
  const guide = document.getElementById('guide-text');
  if (total === 0) {
    guide.textContent = '';
    document.getElementById('empty-card').style.display = 'block';
  } else if (total < 5) {
    guide.textContent = `사과 ${total}알이 나무에 열렸어요. 더 많은 승리로 과수원을 채워보세요!`;
  } else if (total < 10) {
    guide.textContent = `과수원이 점점 풍성해지고 있어요 🍎`;
  } else {
    guide.textContent = `황금빛으로 가득 찬 과수원이네요! ✨`;
  }
}

async function init() {
  try {
    const token = await getSession();
    if (!token) {
      window.location.href = '/eungyo-salon/';
      return;
    }

    const user = await getCurrentUser(token);
    const apples = await fetchApples(user.id, token);

    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';

    updateStats(apples);
    if (apples.length > 0) {
      placeApples(apples);
    }

  } catch(e) {
    console.error('테라 로드 오류:', e);
    document.getElementById('loading-state').innerHTML =
      '<span style="color:rgba(240,235,224,0.4);font-size:13px">불러오기에 실패했어요. 잠시 후 다시 시도해주세요.</span>';
  }
}

window.addEventListener('load', init);
</script>
</body>
</html>
