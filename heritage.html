<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EG헤리티지 — 교양의 보물전</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:      #C9A84C;
  --gold-l:    #E9C97E;
  --gold-dim:  rgba(201,168,76,0.4);
  --gold-faint:rgba(201,168,76,0.12);
  --cream:     #F5F0E8;
  --ink:       #0E0B07;
  --marble:    #2A2218;
  --chalk:     rgba(245,240,232,0.85);
  --chalk-dim: rgba(245,240,232,0.4);
}

html, body {
  width: 100%; min-height: 100%;
  background: var(--ink);
  font-family: 'Apple SD Gothic Neo', 'Noto Serif KR', Georgia, serif;
  color: var(--cream);
  overflow-x: hidden;
  overflow-y: auto;
}

/* ── 배경 홀 (CSS 아트) ── */
#hall-bg {
  position: fixed; inset: 0; z-index: 0;
  transition: opacity 0.8s ease;
}

/* 아우레움 홀 — 황금 천장, 압도적 */
.hall-aureum {
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%,
      rgba(201,168,76,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 30% at 50% 100%,
      rgba(120,80,20,0.25) 0%, transparent 60%),
    linear-gradient(180deg,
      #1a1208 0%, #0E0B07 30%, #12100A 70%, #0E0B07 100%);
}
.hall-aureum::before {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(90deg,
      transparent 0px, transparent 58px,
      rgba(201,168,76,0.06) 58px, rgba(201,168,76,0.06) 60px),
    repeating-linear-gradient(180deg,
      transparent 0px, transparent 58px,
      rgba(201,168,76,0.04) 58px, rgba(201,168,76,0.04) 60px);
}
.hall-aureum::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 40%;
  background: linear-gradient(180deg,
    rgba(201,168,76,0.12) 0%,
    rgba(160,110,20,0.06) 60%,
    transparent 100%);
}

/* 카리아티드 갤러리 — 크림 대리석 벽 */
.hall-caryatid {
  background:
    radial-gradient(ellipse 120% 60% at 50% 0%, rgba(220,210,190,0.15) 0%, transparent 60%),
    linear-gradient(180deg, #E8E0D0 0%, #DDD5C5 40%, #D8CFC0 100%);
}
.hall-caryatid::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 3% 100% at 8% 50%, rgba(180,160,130,0.12) 0%, transparent 100%),
    radial-gradient(ellipse 3% 100% at 92% 50%, rgba(180,160,130,0.12) 0%, transparent 100%),
    repeating-linear-gradient(92deg,
      transparent 0px, transparent 38px,
      rgba(160,140,110,0.04) 38px, rgba(160,140,110,0.04) 40px);
}
.hall-caryatid::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 20%;
  background: linear-gradient(to top, rgba(160,140,110,0.15) 0%, transparent 100%);
}

/* 크로니클 챔버 — 버건디+금 */
.hall-chronicle {
  background: linear-gradient(180deg,
    #180E14 0%, #1A0F16 50%, #140C10 100%);
}
.hall-chronicle::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 100% 50% at 50% 0%,
      rgba(140,40,60,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 50% 100%,
      rgba(100,30,40,0.1) 0%, transparent 60%);
}
.hall-chronicle::after {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(0deg,
      transparent 0px, transparent 79px,
      rgba(201,168,76,0.04) 79px, rgba(201,168,76,0.04) 80px);
}

/* 앰버 살롱 — 따뜻한 호박빛 */
.hall-amber {
  background: linear-gradient(180deg,
    #1A1208 0%, #1E1508 50%, #160F06 100%);
}
.hall-amber::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%,
      rgba(180,110,20,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 80%,
      rgba(160,90,10,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 80%,
      rgba(160,90,10,0.08) 0%, transparent 60%);
}

/* 아르카눔 — 어둡고 신비로운 */
.hall-arcanum {
  background: linear-gradient(180deg,
    #080608 0%, #0A080C 50%, #060408 100%);
}
.hall-arcanum::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 50% 30% at 50% 50%,
      rgba(80,40,120,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 80% 50% at 50% 0%,
      rgba(60,20,80,0.08) 0%, transparent 60%);
}
.hall-arcanum::after {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(45deg,
      transparent 0px, transparent 28px,
      rgba(100,60,160,0.03) 28px, rgba(100,60,160,0.03) 30px);
}

/* ── 노이즈 오버레이 ── */
#noise {
  position: fixed; inset: 0; z-index: 1;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ── 헤더 ── */
.heritage-header {
  position: sticky; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  background: rgba(8,6,4,0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(201,168,76,0.1);
}
.back-btn {
  background: none; border: none;
  color: var(--gold-dim); font-size: 18px;
  cursor: pointer; padding: 4px 8px;
}
.header-title {
  font-size: 11px; letter-spacing: 0.25em;
  color: var(--gold-dim); font-weight: 400;
  text-transform: uppercase;
}
.header-badge {
  font-size: 9px; letter-spacing: 0.15em;
  color: rgba(245,240,232,0.25);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 20px; padding: 3px 10px;
}

/* ── 룸 네비게이션 ── */
.room-nav {
  position: sticky; top: 49px; left: 0; right: 0; z-index: 99;
  display: flex; justify-content: center; gap: 0;
  padding: 0 16px;
  overflow-x: auto; scrollbar-width: none;
  background: rgba(8,6,4,0.88);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(201,168,76,0.08);
}
.room-nav::-webkit-scrollbar { display: none; }
.room-tab {
  flex-shrink: 0;
  padding: 8px 14px; cursor: pointer;
  font-size: 10px; letter-spacing: 0.12em;
  color: rgba(245,240,232,0.3);
  border-bottom: 1px solid rgba(201,168,76,0.1);
  transition: all 0.3s; white-space: nowrap;
  background: none; border-top: none; border-left: none; border-right: none;
}
.room-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.room-tab .room-lock {
  font-size: 9px; margin-left: 4px; opacity: 0.6;
}

/* ── 메인 콘텐츠 ── */
.heritage-content {
  position: relative; z-index: 10;
  display: flex; flex-direction: column;
  padding: 0 0 80px;
  min-height: 100vh;
}

/* ── 룸 타이틀 ── */
.room-title-wrap {
  text-align: center; padding: 24px 20px 24px;
}
.room-latin {
  font-size: 9px; letter-spacing: 0.3em;
  color: var(--gold-dim); margin-bottom: 6px;
  text-transform: uppercase;
}
.room-name-kr {
  font-size: 20px; font-weight: 300;
  color: var(--cream); letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.room-desc {
  font-size: 10px; color: var(--chalk-dim);
  letter-spacing: 0.1em; line-height: 1.6;
}

/* 밝은 홀(카리아티드) 전용 타이틀 색 */
.light-room .room-latin  { color: rgba(120,80,20,0.6); }
.light-room .room-name-kr { color: #2A1A0A; }
.light-room .room-desc   { color: rgba(60,40,20,0.55); }
.light-room .gold-divider::before,
.light-room .gold-divider::after { background: linear-gradient(90deg, transparent, rgba(120,80,20,0.3), transparent); }
.light-room .gold-divider-icon { color: rgba(120,80,20,0.5); }

/* ── 황금 분리선 ── */
.gold-divider {
  display: flex; align-items: center; gap: 12px;
  padding: 0 24px 20px;
}
.gold-divider::before, .gold-divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
}
.gold-divider-icon {
  font-size: 10px; color: var(--gold-dim);
  letter-spacing: 0.2em;
}

/* ── 보물 카드 그리드 ── */
.treasure-grid {
  display: flex;
  flex-direction: column;
  gap: 48px; padding: 24px 20px 60px;
  align-items: center;
}

/* ── 보물 카드 ── */
.treasure-card {
  position: relative;
  width: 100%; max-width: 320px;
  border-radius: 4px; overflow: visible;
  cursor: pointer;
  transition: transform 0.35s;
  background: transparent;
}
.treasure-card:active { transform: scale(0.98); }

/* 보물 이미지 영역 */
.treasure-img-wrap {
  position: relative;
  width: 100%; aspect-ratio: 3/4;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.treasure-artwork {
  font-size: 48px; line-height: 1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
}
/* 액자 내부 장식 */
.treasure-img-wrap::before {
  content: '';
  position: absolute; inset: 8px;
  border-radius: 4px;
}
.diamond .treasure-img-wrap::before {
  border: 1px solid rgba(180,220,255,0.15);
  background: radial-gradient(ellipse at 50% 30%, rgba(120,180,255,0.06) 0%, transparent 70%);
}
.gold .treasure-img-wrap::before {
  border: 1px solid rgba(201,168,76,0.15);
  background: radial-gradient(ellipse at 50% 30%, rgba(201,168,76,0.06) 0%, transparent 70%);
}
.silver .treasure-img-wrap::before {
  border: 1px solid rgba(180,190,200,0.1);
}
.bronze .treasure-img-wrap::before {
  border: 1px solid rgba(160,100,50,0.1);
}

/* 등급 배지 */
/* 배지 — 액자 위에서 제거, 명찰로 이동 */
.grade-badge { display: none; }
.edition-badge { display: none; }

/* 갤러리 명찰 — 루브르 스타일 크림 카드 */
.treasure-label {
  background: #F5F0E8;
  border-radius: 0 0 4px 4px;
  padding: 12px 16px 14px;
  text-align: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25);
}
.treasure-code {
  font-size: 7px; letter-spacing: 0.2em;
  color: rgba(60,40,20,0.4);
  font-family: 'Courier New', monospace;
  margin-bottom: 6px;
}
.treasure-name {
  font-size: 14px; font-weight: 700;
  color: #2A1A0A; letter-spacing: 0.02em;
  line-height: 1.3; margin-bottom: 3px;
}
.treasure-artist {
  font-size: 11px; color: #5A3A1A;
  letter-spacing: 0.03em; margin-bottom: 2px;
  font-style: italic;
}
.treasure-period {
  font-size: 10px; color: rgba(60,40,20,0.6);
  letter-spacing: 0.05em; margin-bottom: 7px;
}
.treasure-origin {
  font-size: 8px; color: rgba(60,40,20,0.45);
  letter-spacing: 0.05em; margin-bottom: 6px;
  padding-top: 6px;
  border-top: 1px solid rgba(60,40,20,0.1);
}
.treasure-owner {
  font-size: 9px; letter-spacing: 0.08em;
  color: #8B4513;
  padding-top: 5px;
  border-top: 1px solid rgba(60,40,20,0.1);
}
.treasure-link-btn {
  display: inline-block; margin-top: 8px;
  font-size: 8px; letter-spacing: 0.12em;
  color: #4A6FA5;
  border: 1px solid rgba(74,111,165,0.4);
  border-radius: 10px; padding: 3px 10px;
  cursor: pointer; transition: all 0.2s;
  text-decoration: none;
  background: rgba(74,111,165,0.06);
}
.treasure-link-btn:active {
  background: rgba(74,111,165,0.15);
}

/* ── 경매 카드 (아르카눔) ── */
.auction-card {
  position: relative; border-radius: 10px;
  background: rgba(12,8,18,0.9);
  border: 1.5px solid rgba(100,60,160,0.3);
  padding: 16px; margin: 0 16px 12px;
  box-shadow: 0 0 24px rgba(80,40,120,0.08);
}
.auction-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 12px;
}
.auction-title-wrap { flex: 1; }
.auction-grade {
  font-size: 8px; letter-spacing: 0.15em;
  color: rgba(180,220,255,0.6); margin-bottom: 3px;
}
.auction-name {
  font-size: 13px; font-weight: 600;
  color: var(--cream); letter-spacing: 0.04em;
}
.auction-artwork { font-size: 36px; }
.auction-info {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.auction-stat {
  flex: 1; text-align: center;
  background: rgba(100,60,160,0.08);
  border: 1px solid rgba(100,60,160,0.15);
  border-radius: 6px; padding: 8px 4px;
}
.auction-stat-val {
  font-size: 15px; font-weight: 700;
  color: var(--gold); font-family: 'Courier New', monospace;
  display: block; margin-bottom: 2px;
}
.auction-stat-label {
  font-size: 7px; letter-spacing: 0.1em;
  color: rgba(245,240,232,0.3);
}
.auction-timer {
  display: flex; align-items: center; gap: 6px;
  font-size: 9px; letter-spacing: 0.1em;
  color: rgba(245,240,232,0.3); margin-bottom: 12px;
}
.timer-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #52B788;
  animation: pulse-dot 1.5s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
.auction-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.08));
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 8px; color: var(--gold);
  font-size: 12px; letter-spacing: 0.12em; cursor: pointer;
  font-family: inherit;
}

/* ── 잠긴 방 ── */
.locked-room {
  margin: 0 16px 16px;
  border-radius: 10px; overflow: hidden;
  border: 1px solid rgba(100,60,160,0.2);
  background: rgba(8,6,12,0.8);
  padding: 32px 20px;
  text-align: center;
}
.lock-icon {
  font-size: 32px; margin-bottom: 12px;
  filter: drop-shadow(0 0 12px rgba(100,60,160,0.4));
  animation: float-lock 3s ease-in-out infinite;
}
@keyframes float-lock {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)}
}
.lock-title {
  font-size: 14px; font-weight: 500;
  color: rgba(245,240,232,0.5); letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.lock-desc {
  font-size: 10px; color: rgba(245,240,232,0.2);
  letter-spacing: 0.08em; line-height: 1.7;
}
.lock-open-date {
  margin-top: 12px; font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(100,60,160,0.6);
  font-family: 'Courier New', monospace;
}

/* ── 하단 ── */
.heritage-footer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 12px 20px 28px;
  background: linear-gradient(to top, rgba(8,6,4,0.95) 0%, transparent 100%);
  text-align: center;
}
.footer-text {
  font-size: 9px; letter-spacing: 0.15em;
  color: rgba(245,240,232,0.15);
}

/* ── 페이드 트랜지션 ── */
.room-content { animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="hall-bg" class="hall-aureum"></div>
<div id="noise"></div>

<!-- 헤더 -->
<div class="heritage-header">
  <button class="back-btn" onclick="goHome()">←</button>
  <div class="header-title">E G  H E R I T A G E</div>
  <div class="header-badge">2026 · 봄 시즌</div>
</div>

<!-- 룸 네비게이션 -->
<div class="room-nav">
  <button class="room-tab active" onclick="switchRoom('aureum')">아우레움</button>
  <button class="room-tab" onclick="switchRoom('caryatid')">카리아티드</button>
  <button class="room-tab" onclick="switchRoom('chronicle')">크로니클</button>
  <button class="room-tab" onclick="switchRoom('amber')">앰버</button>
  <button class="room-tab" onclick="switchRoom('arcanum')">아르카눔 <span class="room-lock">🔒</span></button>
</div>

<!-- 메인 콘텐츠 -->
<div class="heritage-content" id="heritage-content">
</div>

<!-- 하단 -->
<div class="heritage-footer">
  <div class="footer-text">EG HERITAGE · 교양이 보물이 되고, 보물이 순환한다</div>
</div>

let currentRoom = 'aureum';

function switchRoom(roomId) {
  currentRoom = roomId;

  // 탭 활성화
  document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  // 배경 전환
  const bg = document.getElementById('hall-bg');
  bg.style.opacity = '0';
  setTimeout(() => {
    bg.className = ROOMS[roomId].hall;
    bg.style.opacity = '1';
  }, 400);

  // 밝은 홀 처리 (카리아티드 = 크림 대리석)
  const content = document.getElementById('heritage-content');
  if (roomId === 'caryatid') {
    content.classList.add('light-room');
    document.body.style.background = '#D8CFC0';
  } else {
    content.classList.remove('light-room');
    document.body.style.background = '';
  }

  // 콘텐츠 렌더
  renderRoom(roomId);
  window.scrollTo(0, 0);
}

function renderRoom(roomId) {
  const room = ROOMS[roomId];
  const content = document.getElementById('heritage-content');

  let html = `
    <div class="room-content">
      <div class="room-title-wrap">
        <div class="room-latin">${room.latin}</div>
        <div class="room-name-kr">${room.name}</div>
        <div class="room-desc">${room.desc}</div>
      </div>
      <div class="gold-divider">
        <div class="gold-divider-icon">✦</div>
      </div>`;

  if (room.type === 'auction') {
    html += renderAuction();
  } else if (room.type === 'treasures') {
    html += renderTreasures(room.grade);
  } else if (room.type === 'locked') {
    html += renderLocked();
  }

  html += `</div>`;
  content.innerHTML = html;
  content.scrollTop = 0;
}

          🍎 황금사과로 입찰하기
        </button>

      </div>`;
  });
  return html;
}


// ── 액자 메타데이터 ──────────────────────────────────────────
const FRAME_META = {
  'frame_diamond_01':{grade:'diamond',ratio:'portrait',inset:{top:28,right:20,bottom:16,left:20}},
  'frame_diamond_02':{grade:'diamond',ratio:'portrait',inset:{top:22,right:18,bottom:18,left:18}},

  'frame_diamond_05':{grade:'diamond',ratio:'portrait',inset:{top:18,right:16,bottom:16,left:16}},
  'frame_gold_01':   {grade:'gold',   ratio:'square',  inset:{top:12,right:12,bottom:12,left:12}},
  'frame_gold_02':   {grade:'gold',   ratio:'portrait',inset:{top:14,right:13,bottom:13,left:13}},

// 등급별 액자 목록
const FRAME_BY_GRADE = {};
Object.keys(FRAME_META).forEach(k => {
  const g = FRAME_META[k].grade;
  if (!FRAME_BY_GRADE[g]) FRAME_BY_GRADE[g] = [];
  FRAME_BY_GRADE[g].push(k);
});

// 등급별 랜덤 액자 선택 (아이템 코드로 시드 — 같은 보물은 항상 같은 액자)
function getFrameForItem(itemCode, grade) {
  const frames = FRAME_BY_GRADE[grade] || FRAME_BY_GRADE['bronze'];
  // 코드 해시로 일관된 선택
  let hash = 0;
  for (let i = 0; i < itemCode.length; i++) hash = (hash * 31 + itemCode.charCodeAt(i)) & 0xffff;
  return frames[hash % frames.length];
}

function renderTreasures(grade) {
  const items = TREASURES[grade] || [];
  let html = '<div class="treasure-grid">';
  items.forEach(item => {
    const soldOut = item.edition.includes('SOLD OUT');
    const frameKey = getFrameForItem(item.code, item.grade);
    const meta = FRAME_META[frameKey];
    const {top, right, bottom, left} = meta.inset;
    const isOval = meta.ratio === 'oval';
    const clipStyle = isOval ? `clip-path:ellipse(${50-left/2}% ${50-top/2}% at 50% 50%);` : '';

    html += `
      <div class="treasure-card ${item.grade}" onclick="openTreasure('${item.code}')">
        <!-- 액자 래퍼 -->
        <div style="position:relative;width:100%;aspect-ratio:${
          meta.ratio==='landscape' ? '4/3' : meta.ratio==='square' ? '1/1' : '3/4'
        }">
          <!-- 보물 콘텐츠 (액자 안쪽) -->
          <div style="
            position:absolute;
            top:${top}%;right:${right}%;bottom:${bottom}%;left:${left}%;
            overflow:hidden;
            display:flex;align-items:center;justify-content:center;
            background:transparent;
            ${clipStyle}
          ">
            ${item.img
              ? `<img src="${item.img}"
                  style="width:100%;height:100%;object-fit:cover;"
                  onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                 <div style="display:none;font-size:${meta.ratio==='square'?'38':'44'}px;
                   filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3));
                   width:100%;height:100%;align-items:center;justify-content:center;">
                   ${item.artwork}
                 </div>`
              : `<div style="font-size:${meta.ratio==='square'?'38':'44'}px;
                  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3))">${item.artwork}</div>`
            }
            ${soldOut ? '<div style="position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:0.15em;color:rgba(245,240,232,0.5)">SOLD OUT</div>' : ''}
          </div>
          <!-- 액자 이미지 오버레이 -->
          <img src="${frameKey}.png"
            style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:2;pointer-events:none;mix-blend-mode:screen;"
            alt="frame">
          <!-- 배지들 -->
          <div class="grade-badge" style="z-index:3">${getGradeLabel(item.grade)}</div>
          <div class="edition-badge" style="z-index:3">${item.edition}</div>
        </div>
        <div class="treasure-label">
          <div class="treasure-code">${item.code}</div>
          <div class="treasure-name">${item.name}</div>
          <div class="treasure-artist">${item.artist || ''}</div>
          <div class="treasure-period">${item.period || ''}</div>
          <div class="treasure-origin">${item.origin || ''}</div>
          <div style="font-size:9px;color:rgba(60,40,20,0.5);letter-spacing:0.1em;margin-top:4px;">
            ${getGradeLabel(item.grade)} ${item.edition}
          </div>
          <div class="treasure-owner">${item.owner ? '📍 ' + item.owner + ' 소장 중' : '✦ 소장 가능'}</div>
          ${item.source_url ? `<a class="treasure-link-btn" href="${item.source_url}" target="_blank" onclick="event.stopPropagation()">🔗 원본 감상</a>` : ''}
        </div>
      </div>`;
  });
  html += '</div>';
  return html;
}

function getBgColor(grade) {
  const colors = {
    diamond: 'linear-gradient(180deg, rgba(20,15,30,0.9) 0%, rgba(10,8,18,0.95) 100%)',
    gold: 'linear-gradient(180deg, rgba(25,18,8,0.9) 0%, rgba(15,10,5,0.95) 100%)',
    silver: 'linear-gradient(180deg, rgba(18,18,22,0.9) 0%, rgba(10,10,14,0.95) 100%)',
    bronze: 'linear-gradient(180deg, rgba(22,14,8,0.9) 0%, rgba(14,10,6,0.95) 100%)',
  };
  return colors[grade] || colors.bronze;
}

function getGradeLabel(grade) {
  const labels = { diamond:'💎', gold:'🥇', silver:'🥈', bronze:'🥉' };
  return labels[grade] || '';
}
