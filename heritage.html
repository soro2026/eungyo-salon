<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EG헤리티지 — 교양의 보물전</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:      #C9A84C;
  --gold-l:    #E9C97E;
  --gold-dim:  rgba(201,168,76,0.4);
  --gold-faint:rgba(201,168,76,0.12);
  --cream:     #F5F0E8;
  --ink:       #0E0B07;
  --marble:    #2A2218;
  --chalk:     rgba(245,240,232,0.85);
  --chalk-dim: rgba(245,240,232,0.4);
}

html, body {
  width: 100%; height: 100%;
  background: var(--ink);
  font-family: 'Apple SD Gothic Neo', 'Noto Serif KR', Georgia, serif;
  color: var(--cream);
  overflow: hidden;
}

/* ── 배경 홀 (CSS 아트) ── */
#hall-bg {
  position: fixed; inset: 0; z-index: 0;
  transition: opacity 0.8s ease;
}

/* 아우레움 홀 — 황금 천장, 압도적 */
.hall-aureum {
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%,
      rgba(201,168,76,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 60% 30% at 50% 100%,
      rgba(120,80,20,0.25) 0%, transparent 60%),
    linear-gradient(180deg,
      #1a1208 0%, #0E0B07 30%, #12100A 70%, #0E0B07 100%);
}
.hall-aureum::before {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(90deg,
      transparent 0px, transparent 58px,
      rgba(201,168,76,0.06) 58px, rgba(201,168,76,0.06) 60px),
    repeating-linear-gradient(180deg,
      transparent 0px, transparent 58px,
      rgba(201,168,76,0.04) 58px, rgba(201,168,76,0.04) 60px);
}
.hall-aureum::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 40%;
  background: linear-gradient(180deg,
    rgba(201,168,76,0.12) 0%,
    rgba(160,110,20,0.06) 60%,
    transparent 100%);
}

/* 카리아티드 갤러리 — 석조 기둥, 크림색 */
.hall-caryatid {
  background: linear-gradient(180deg,
    #1C1810 0%, #241E14 40%, #1A1610 100%);
}
.hall-caryatid::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 20% 100% at 10% 50%,
      rgba(220,200,160,0.08) 0%, transparent 100%),
    radial-gradient(ellipse 20% 100% at 90% 50%,
      rgba(220,200,160,0.08) 0%, transparent 100%),
    radial-gradient(ellipse 20% 100% at 30% 50%,
      rgba(220,200,160,0.05) 0%, transparent 100%),
    radial-gradient(ellipse 20% 100% at 70% 50%,
      rgba(220,200,160,0.05) 0%, transparent 100%);
}
.hall-caryatid::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 35%;
  background: repeating-linear-gradient(90deg,
    rgba(180,160,120,0.04) 0px, rgba(180,160,120,0.04) 1px,
    transparent 1px, transparent 60px);
}

/* 크로니클 챔버 — 버건디+금 */
.hall-chronicle {
  background: linear-gradient(180deg,
    #180E14 0%, #1A0F16 50%, #140C10 100%);
}
.hall-chronicle::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 100% 50% at 50% 0%,
      rgba(140,40,60,0.15) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 50% 100%,
      rgba(100,30,40,0.1) 0%, transparent 60%);
}
.hall-chronicle::after {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(0deg,
      transparent 0px, transparent 79px,
      rgba(201,168,76,0.04) 79px, rgba(201,168,76,0.04) 80px);
}

/* 앰버 살롱 — 따뜻한 호박빛 */
.hall-amber {
  background: linear-gradient(180deg,
    #1A1208 0%, #1E1508 50%, #160F06 100%);
}
.hall-amber::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 30%,
      rgba(180,110,20,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 20% 80%,
      rgba(160,90,10,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 80%,
      rgba(160,90,10,0.08) 0%, transparent 60%);
}

/* 아르카눔 — 어둡고 신비로운 */
.hall-arcanum {
  background: linear-gradient(180deg,
    #080608 0%, #0A080C 50%, #060408 100%);
}
.hall-arcanum::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 50% 30% at 50% 50%,
      rgba(80,40,120,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 80% 50% at 50% 0%,
      rgba(60,20,80,0.08) 0%, transparent 60%);
}
.hall-arcanum::after {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(45deg,
      transparent 0px, transparent 28px,
      rgba(100,60,160,0.03) 28px, rgba(100,60,160,0.03) 30px);
}

/* ── 노이즈 오버레이 ── */
#noise {
  position: fixed; inset: 0; z-index: 1;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ── 헤더 ── */
.heritage-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 52px 20px 16px;
  background: linear-gradient(to bottom, rgba(8,6,4,0.9) 0%, transparent 100%);
}
.back-btn {
  background: none; border: none;
  color: var(--gold-dim); font-size: 18px;
  cursor: pointer; padding: 4px 8px;
}
.header-title {
  font-size: 11px; letter-spacing: 0.25em;
  color: var(--gold-dim); font-weight: 400;
  text-transform: uppercase;
}
.header-badge {
  font-size: 9px; letter-spacing: 0.15em;
  color: rgba(245,240,232,0.25);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 20px; padding: 3px 10px;
}

/* ── 룸 네비게이션 ── */
.room-nav {
  position: fixed; top: 100px; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: center; gap: 0;
  padding: 0 16px;
  overflow-x: auto; scrollbar-width: none;
}
.room-nav::-webkit-scrollbar { display: none; }
.room-tab {
  flex-shrink: 0;
  padding: 8px 14px; cursor: pointer;
  font-size: 10px; letter-spacing: 0.12em;
  color: rgba(245,240,232,0.3);
  border-bottom: 1px solid rgba(201,168,76,0.1);
  transition: all 0.3s; white-space: nowrap;
  background: none; border-top: none; border-left: none; border-right: none;
}
.room-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.room-tab .room-lock {
  font-size: 9px; margin-left: 4px; opacity: 0.6;
}

/* ── 메인 콘텐츠 ── */
.heritage-content {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  padding: 148px 0 100px;
  overflow-y: auto;
}

/* ── 룸 타이틀 ── */
.room-title-wrap {
  text-align: center; padding: 0 20px 24px;
}
.room-latin {
  font-size: 9px; letter-spacing: 0.3em;
  color: var(--gold-dim); margin-bottom: 6px;
  text-transform: uppercase;
}
.room-name-kr {
  font-size: 20px; font-weight: 300;
  color: var(--cream); letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.room-desc {
  font-size: 10px; color: var(--chalk-dim);
  letter-spacing: 0.1em; line-height: 1.6;
}

/* ── 황금 분리선 ── */
.gold-divider {
  display: flex; align-items: center; gap: 12px;
  padding: 0 24px 20px;
}
.gold-divider::before, .gold-divider::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
}
.gold-divider-icon {
  font-size: 10px; color: var(--gold-dim);
  letter-spacing: 0.2em;
}

/* ── 보물 카드 그리드 ── */
.treasure-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px; padding: 0 16px 16px;
}

/* ── 보물 카드 ── */
.treasure-card {
  position: relative;
  border-radius: 10px; overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  background: rgba(20,15,8,0.8);
}
.treasure-card:active { transform: scale(0.97); }

/* 등급별 액자 테두리 */
.treasure-card.diamond {
  border: 1.5px solid rgba(180,220,255,0.4);
  box-shadow: 0 0 20px rgba(120,180,255,0.1), inset 0 0 30px rgba(0,0,0,0.5);
}
.treasure-card.gold {
  border: 1.5px solid rgba(201,168,76,0.5);
  box-shadow: 0 0 16px rgba(201,168,76,0.1), inset 0 0 20px rgba(0,0,0,0.4);
}
.treasure-card.silver {
  border: 1.5px solid rgba(180,190,200,0.35);
  box-shadow: 0 0 12px rgba(180,190,200,0.06);
}
.treasure-card.bronze {
  border: 1.5px solid rgba(160,100,50,0.35);
  box-shadow: 0 0 10px rgba(160,100,50,0.06);
}

/* 보물 이미지 영역 */
.treasure-img-wrap {
  position: relative;
  width: 100%; aspect-ratio: 3/4;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.treasure-artwork {
  font-size: 48px; line-height: 1;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
}
/* 액자 내부 장식 */
.treasure-img-wrap::before {
  content: '';
  position: absolute; inset: 8px;
  border-radius: 4px;
}
.diamond .treasure-img-wrap::before {
  border: 1px solid rgba(180,220,255,0.15);
  background: radial-gradient(ellipse at 50% 30%, rgba(120,180,255,0.06) 0%, transparent 70%);
}
.gold .treasure-img-wrap::before {
  border: 1px solid rgba(201,168,76,0.15);
  background: radial-gradient(ellipse at 50% 30%, rgba(201,168,76,0.06) 0%, transparent 70%);
}
.silver .treasure-img-wrap::before {
  border: 1px solid rgba(180,190,200,0.1);
}
.bronze .treasure-img-wrap::before {
  border: 1px solid rgba(160,100,50,0.1);
}

/* 등급 배지 */
.grade-badge {
  position: absolute; top: 8px; right: 8px;
  font-size: 8px; letter-spacing: 0.12em;
  padding: 2px 7px; border-radius: 10px;
}
.diamond .grade-badge {
  background: rgba(120,180,255,0.15);
  border: 1px solid rgba(120,180,255,0.3);
  color: rgba(180,220,255,0.9);
}
.gold .grade-badge {
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.35);
  color: var(--gold);
}
.silver .grade-badge {
  background: rgba(180,190,200,0.1);
  border: 1px solid rgba(180,190,200,0.25);
  color: rgba(200,210,220,0.8);
}
.bronze .grade-badge {
  background: rgba(160,100,50,0.1);
  border: 1px solid rgba(160,100,50,0.25);
  color: rgba(200,150,100,0.8);
}

/* 한정 수량 배지 */
.edition-badge {
  position: absolute; top: 8px; left: 8px;
  font-size: 7px; letter-spacing: 0.08em;
  padding: 2px 6px; border-radius: 10px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(245,240,232,0.1);
  color: rgba(245,240,232,0.5);
}

/* 갤러리 표찰 */
.treasure-label {
  padding: 10px 12px 12px;
  border-top: 1px solid rgba(201,168,76,0.1);
}
.treasure-code {
  font-size: 7px; letter-spacing: 0.15em;
  color: rgba(245,240,232,0.25);
  font-family: 'Courier New', monospace;
  margin-bottom: 3px;
}
.treasure-name {
  font-size: 11px; font-weight: 500;
  color: var(--cream); letter-spacing: 0.04em;
  line-height: 1.4; margin-bottom: 4px;
}
.treasure-origin {
  font-size: 9px; color: var(--chalk-dim);
  letter-spacing: 0.06em; margin-bottom: 6px;
}
.treasure-owner {
  font-size: 8px; letter-spacing: 0.1em;
  color: var(--gold-dim);
  padding: 2px 0;
  border-top: 1px solid rgba(201,168,76,0.1);
}

/* ── 경매 카드 (아르카눔) ── */
.auction-card {
  position: relative; border-radius: 10px;
  background: rgba(12,8,18,0.9);
  border: 1.5px solid rgba(100,60,160,0.3);
  padding: 16px; margin: 0 16px 12px;
  box-shadow: 0 0 24px rgba(80,40,120,0.08);
}
.auction-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 12px;
}
.auction-title-wrap { flex: 1; }
.auction-grade {
  font-size: 8px; letter-spacing: 0.15em;
  color: rgba(180,220,255,0.6); margin-bottom: 3px;
}
.auction-name {
  font-size: 13px; font-weight: 600;
  color: var(--cream); letter-spacing: 0.04em;
}
.auction-artwork { font-size: 36px; }
.auction-info {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.auction-stat {
  flex: 1; text-align: center;
  background: rgba(100,60,160,0.08);
  border: 1px solid rgba(100,60,160,0.15);
  border-radius: 6px; padding: 8px 4px;
}
.auction-stat-val {
  font-size: 15px; font-weight: 700;
  color: var(--gold); font-family: 'Courier New', monospace;
  display: block; margin-bottom: 2px;
}
.auction-stat-label {
  font-size: 7px; letter-spacing: 0.1em;
  color: rgba(245,240,232,0.3);
}
.auction-timer {
  display: flex; align-items: center; gap: 6px;
  font-size: 9px; letter-spacing: 0.1em;
  color: rgba(245,240,232,0.3); margin-bottom: 12px;
}
.timer-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #52B788;
  animation: pulse-dot 1.5s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
.auction-btn {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(201,168,76,0.08));
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 8px; color: var(--gold);
  font-size: 12px; letter-spacing: 0.12em; cursor: pointer;
  font-family: inherit;
}

/* ── 잠긴 방 ── */
.locked-room {
  margin: 0 16px 16px;
  border-radius: 10px; overflow: hidden;
  border: 1px solid rgba(100,60,160,0.2);
  background: rgba(8,6,12,0.8);
  padding: 32px 20px;
  text-align: center;
}
.lock-icon {
  font-size: 32px; margin-bottom: 12px;
  filter: drop-shadow(0 0 12px rgba(100,60,160,0.4));
  animation: float-lock 3s ease-in-out infinite;
}
@keyframes float-lock {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)}
}
.lock-title {
  font-size: 14px; font-weight: 500;
  color: rgba(245,240,232,0.5); letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.lock-desc {
  font-size: 10px; color: rgba(245,240,232,0.2);
  letter-spacing: 0.08em; line-height: 1.7;
}
.lock-open-date {
  margin-top: 12px; font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(100,60,160,0.6);
  font-family: 'Courier New', monospace;
}

/* ── 하단 ── */
.heritage-footer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 12px 20px 28px;
  background: linear-gradient(to top, rgba(8,6,4,0.95) 0%, transparent 100%);
  text-align: center;
}
.footer-text {
  font-size: 9px; letter-spacing: 0.15em;
  color: rgba(245,240,232,0.15);
}

/* ── 페이드 트랜지션 ── */
.room-content { animation: fadeIn 0.5s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="hall-bg" class="hall-aureum"></div>
<div id="noise"></div>

<!-- 헤더 -->
<div class="heritage-header">
  <button class="back-btn" onclick="goHome()">←</button>
  <div class="header-title">E G  H E R I T A G E</div>
  <div class="header-badge">2026 · 봄 시즌</div>
</div>

<!-- 룸 네비게이션 -->
<div class="room-nav">
  <button class="room-tab active" onclick="switchRoom('aureum')">아우레움</button>
  <button class="room-tab" onclick="switchRoom('caryatid')">카리아티드</button>
  <button class="room-tab" onclick="switchRoom('chronicle')">크로니클</button>
  <button class="room-tab" onclick="switchRoom('amber')">앰버</button>
  <button class="room-tab" onclick="switchRoom('arcanum')">아르카눔 <span class="room-lock">🔒</span></button>
</div>

<!-- 메인 콘텐츠 -->
<div class="heritage-content" id="heritage-content">
</div>

<!-- 하단 -->
<div class="heritage-footer">
  <div class="footer-text">EG HERITAGE · 교양이 보물이 되고, 보물이 순환한다</div>
</div>

<script>
// ── 룸 데이터 ──────────────────────────────────────────────────
const ROOMS = {

    latin: 'AUREUM HALL',

  },
  chronicle: {

    type: 'treasures',
    grade: 'silver',
  },
  amber: {
    latin: 'AMBER SALON',
    name: '앰버 살롱',
    desc: '따뜻한 호박빛 공간 — 교양의 첫 발걸음을 내딛는 곳',
    hall: 'hall-amber',
    type: 'treasures',
    grade: 'bronze',
  },
  arcanum: {
    latin: 'ARCANUM',
    name: '아르카눔',
    desc: '비밀의 방 — 아직 베일에 싸인 보물들이 잠들어 있습니다',
    hall: 'hall-arcanum',
    type: 'locked',
  },
};

// ── 샘플 보물 데이터 ──────────────────────────────────────────
const TREASURES = {
  auction: [
    {
      grade: 'diamond', artwork: '🖼️',
      code: 'EG-2026-S01-D001',
      name: '별이 빛나는 밤 — 빈센트 반 고흐',
      origin: '1889 · 뉴욕 현대미술관',
      edition: '1/1 · 단 하나뿐인 소장권',
      currentBid: 47, bidCount: 12,
      endTime: '월 08:00 마감',
      owner: null,
    },
    {
      grade: 'gold', artwork: '🎵',
      code: 'EG-2026-S01-G001',
      name: '쇼팽 야상곡 Op.9 No.2 악보',
      origin: '1830~32 · 파리 국립도서관',
      edition: '3/5 남음',
      currentBid: 18, bidCount: 6,
      endTime: '월 08:00 마감',
      owner: null,
    },
  ],
  gold: [
    {
      grade: 'gold', artwork: '🏺',
      code: 'EG-2026-S01-G002',
      name: '아테나 여신 도자기',
      origin: '기원전 5세기 · 루브르 박물관',
      edition: '2/5',
      owner: '[소로의 방]',
    },

let currentRoom = 'aureum';

function switchRoom(roomId) {
  currentRoom = roomId;

  // 탭 활성화
  document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');

  // 배경 전환
  const bg = document.getElementById('hall-bg');
  bg.style.opacity = '0';
  setTimeout(() => {
    bg.className = ROOMS[roomId].hall;
    bg.style.opacity = '1';
  }, 400);

  // 콘텐츠 렌더
  renderRoom(roomId);
}

function renderRoom(roomId) {
  const room = ROOMS[roomId];
  const content = document.getElementById('heritage-content');

  let html = `
    <div class="room-content">
      <div class="room-title-wrap">
        <div class="room-latin">${room.latin}</div>
        <div class="room-name-kr">${room.name}</div>
        <div class="room-desc">${room.desc}</div>
      </div>
      <div class="gold-divider">
        <div class="gold-divider-icon">✦</div>
      </div>`;

  if (room.type === 'auction') {
    html += renderAuction();
  } else if (room.type === 'treasures') {
    html += renderTreasures(room.grade);
  } else if (room.type === 'locked') {
    html += renderLocked();
  }

  html += `</div>`;
  content.innerHTML = html;
  content.scrollTop = 0;
}

// 등급별 액자 목록
const FRAME_BY_GRADE = {};
Object.keys(FRAME_META).forEach(k => {
  const g = FRAME_META[k].grade;
  if (!FRAME_BY_GRADE[g]) FRAME_BY_GRADE[g] = [];
  FRAME_BY_GRADE[g].push(k);
});

// 등급별 랜덤 액자 선택 (아이템 코드로 시드 — 같은 보물은 항상 같은 액자)
function getFrameForItem(itemCode, grade) {
  const frames = FRAME_BY_GRADE[grade] || FRAME_BY_GRADE['bronze'];
  // 코드 해시로 일관된 선택
  let hash = 0;
  for (let i = 0; i < itemCode.length; i++) hash = (hash * 31 + itemCode.charCodeAt(i)) & 0xffff;
  return frames[hash % frames.length];
}

function renderTreasures(grade) {
  const items = TREASURES[grade] || [];
  let html = '<div class="treasure-grid">';
  items.forEach(item => {
    const soldOut = item.edition.includes('SOLD OUT');
    const frameKey = getFrameForItem(item.code, item.grade);
    const meta = FRAME_META[frameKey];
    const {top, right, bottom, left} = meta.inset;
    const isOval = meta.ratio === 'oval';
    const clipStyle = isOval ? `clip-path:ellipse(${50-left/2}% ${50-top/2}% at 50% 50%);` : '';

    html += `
      <div class="treasure-card ${item.grade}" onclick="openTreasure('${item.code}')">
        <!-- 액자 래퍼 -->
        <div style="position:relative;width:100%;aspect-ratio:${
          meta.ratio==='landscape' ? '4/3' : meta.ratio==='square' ? '1/1' : '3/4'
        }">
          <!-- 보물 콘텐츠 (액자 안쪽) -->
          <div style="
            position:absolute;
            top:${top}%;right:${right}%;bottom:${bottom}%;left:${left}%;
            overflow:hidden;
            display:flex;align-items:center;justify-content:center;
            background:${getBgColor(item.grade)};
            ${clipStyle}
          ">
            ${item.img
              ? `<img src="${item.img}" style="width:100%;height:100%;object-fit:cover;">`
              : `<div style="font-size:${meta.ratio==='square'?'38':'44'}px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.6))">${item.artwork}</div>`
            }
            ${soldOut ? '<div style="position:absolute;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:0.15em;color:rgba(245,240,232,0.5)">SOLD OUT</div>' : ''}
          </div>
          <!-- 액자 이미지 오버레이 -->
          <img src="frames/${frameKey}.png"
            style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:2;pointer-events:none;"
            alt="frame">
          <!-- 배지들 -->
          <div class="grade-badge" style="z-index:3">${getGradeLabel(item.grade)}</div>
          <div class="edition-badge" style="z-index:3">${item.edition}</div>
        </div>
        <div class="treasure-label">
          <div class="treasure-code">${item.code}</div>
          <div class="treasure-name">${item.name}</div>
          <div class="treasure-origin">${item.origin}</div>
          <div class="treasure-owner">${item.owner ? '📍 ' + item.owner + ' 소장 중' : '✦ 소장 가능'}</div>
        </div>
      </div>`;
  });
  html += '</div>';
  return html;
}

function getBgColor(grade) {
  const colors = {
    diamond: 'linear-gradient(180deg, rgba(20,15,30,0.9) 0%, rgba(10,8,18,0.95) 100%)',
    gold: 'linear-gradient(180deg, rgba(25,18,8,0.9) 0%, rgba(15,10,5,0.95) 100%)',
    silver: 'linear-gradient(180deg, rgba(18,18,22,0.9) 0%, rgba(10,10,14,0.95) 100%)',
    bronze: 'linear-gradient(180deg, rgba(22,14,8,0.9) 0%, rgba(14,10,6,0.95) 100%)',
  };
  return colors[grade] || colors.bronze;
}

function getGradeLabel(grade) {
  const labels = { diamond:'💎', gold:'🥇', silver:'🥈', bronze:'🥉' };
  return labels[grade] || '';
}
