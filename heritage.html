<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EG헤리티지 — 교양의 보물전</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold:       #C9A84C;
  --gold-l:     #E9C97E;
  --gold-dim:   rgba(201,168,76,0.45);
  --gold-faint: rgba(201,168,76,0.12);
  --cream:      #F5F0E8;
  --cream-dim:  rgba(245,240,232,0.6);
  --ink:        #0E0B07;
  --wall:       #EDE5D4;
  --wall-dark:  #D8CFC0;
}

html, body {
  width: 100%; min-height: 100%;
  background: var(--ink);
  font-family: 'Apple SD Gothic Neo', 'Noto Serif KR', Georgia, serif;
  color: var(--cream);
  overflow-x: hidden;
}

/* ── 갤러리 배경 ── */
#hall-bg {
  position: fixed; inset: 0; z-index: 0;
  transition: opacity 0.5s ease;
}
#hall-bg::before, #hall-bg::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
}

/* 르네상스·바로크관 — 따뜻한 황금 호박빛. 베네치아 궁전 */
.bg-renaissance {
  background: linear-gradient(160deg, #2A1A08 0%, #1E1206 40%, #261808 70%, #1A1006 100%);
}
.bg-renaissance::before {
  background:
    radial-gradient(ellipse 90% 50% at 50% 0%, rgba(220,150,40,0.22) 0%, transparent 55%),
    radial-gradient(ellipse 40% 60% at 10% 50%, rgba(180,100,20,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 90% 50%, rgba(180,100,20,0.1) 0%, transparent 60%);
}
.bg-renaissance::after {
  background:
    repeating-linear-gradient(90deg, transparent 0, transparent 48px, rgba(201,168,76,0.05) 48px, rgba(201,168,76,0.05) 50px),
    repeating-linear-gradient(0deg, transparent 0, transparent 48px, rgba(201,168,76,0.03) 48px, rgba(201,168,76,0.03) 50px);
}

/* 낭만·인상주의관 — 밝은 크림 석고벽. 오르세 미술관 */
.bg-romantic {
  background: linear-gradient(180deg, #F0E8D8 0%, #E8DFCC 40%, #DDD4BF 100%);
}
.bg-romantic::before {
  background:
    radial-gradient(ellipse 120% 60% at 50% -10%, rgba(255,240,200,0.5) 0%, transparent 55%),
    radial-gradient(ellipse 60% 40% at 15% 80%, rgba(180,160,120,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 80%, rgba(180,160,120,0.12) 0%, transparent 60%);
}
.bg-romantic::after {
  background:
    repeating-linear-gradient(93deg, transparent 0, transparent 34px, rgba(140,120,80,0.05) 34px, rgba(140,120,80,0.05) 36px);
}

/* 근현대관 — 차갑고 절제된 콘크리트. 뉴욕 MoMA */
.bg-modern {
  background: linear-gradient(180deg, #1C1C1E 0%, #18181A 50%, #141416 100%);
}
.bg-modern::before {
  background:
    radial-gradient(ellipse 60% 30% at 50% 0%, rgba(200,200,220,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 30% 80% at 0% 50%, rgba(180,180,200,0.03) 0%, transparent 70%),
    radial-gradient(ellipse 30% 80% at 100% 50%, rgba(180,180,200,0.03) 0%, transparent 70%);
}
.bg-modern::after {
  background:
    repeating-linear-gradient(90deg, transparent 0, transparent 68px, rgba(200,200,220,0.03) 68px, rgba(200,200,220,0.03) 70px),
    repeating-linear-gradient(0deg, transparent 0, transparent 68px, rgba(200,200,220,0.02) 68px, rgba(200,200,220,0.02) 70px);
}

/* 고대·중세관 — 깊은 버건디+금. 바티칸 궁전 */
.bg-ancient {
  background: linear-gradient(170deg, #1E0810 0%, #180612 40%, #22080E 70%, #160408 100%);
}
.bg-ancient::before {
  background:
    radial-gradient(ellipse 80% 45% at 50% 0%, rgba(160,30,50,0.25) 0%, transparent 55%),
    radial-gradient(ellipse 50% 70% at 50% 100%, rgba(120,20,30,0.15) 0%, transparent 60%);
}
.bg-ancient::after {
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent 59px, rgba(201,168,76,0.05) 59px, rgba(201,168,76,0.05) 60px),
    repeating-linear-gradient(90deg, transparent 0, transparent 59px, rgba(201,168,76,0.03) 59px, rgba(201,168,76,0.03) 60px);
}

/* 동양관 — 먹빛 청록. 고궁박물원 */
.bg-oriental {
  background: linear-gradient(160deg, #061210 0%, #081614 40%, #0A1A16 70%, #060E0C 100%);
}
.bg-oriental::before {
  background:
    radial-gradient(ellipse 70% 40% at 50% 0%, rgba(30,100,80,0.2) 0%, transparent 55%),
    radial-gradient(ellipse 40% 60% at 20% 60%, rgba(20,80,60,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 40%, rgba(20,80,60,0.08) 0%, transparent 60%);
}
.bg-oriental::after {
  background:
    repeating-linear-gradient(45deg, transparent 0, transparent 39px, rgba(30,100,80,0.04) 39px, rgba(30,100,80,0.04) 40px),
    repeating-linear-gradient(135deg, transparent 0, transparent 39px, rgba(30,100,80,0.02) 39px, rgba(30,100,80,0.02) 40px);
}

/* 음악당 — 짙은 남청색. 빈 콘서트홀 */
.bg-music {
  background: linear-gradient(180deg, #080C1E 0%, #0A0E22 40%, #060A1A 100%);
}
.bg-music::before {
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(50,60,160,0.25) 0%, transparent 55%),
    radial-gradient(ellipse 40% 50% at 30% 80%, rgba(80,40,120,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 70% 80%, rgba(80,40,120,0.1) 0%, transparent 60%);
}
.bg-music::after {
  background:
    radial-gradient(ellipse 100% 20% at 50% 50%, rgba(60,80,200,0.06) 0%, transparent 70%);
}

/* 건축·공간관 — 서늘한 청회색. 루브르 유리 피라미드 */
.bg-architecture {
  background: linear-gradient(180deg, #0E1218 0%, #101418 50%, #0C1014 100%);
}
.bg-architecture::before {
  background:
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(80,120,160,0.15) 0%, transparent 55%),
    radial-gradient(ellipse 80% 30% at 50% 100%, rgba(60,90,120,0.1) 0%, transparent 60%);
}
.bg-architecture::after {
  background:
    repeating-linear-gradient(60deg, transparent 0, transparent 48px, rgba(80,120,160,0.04) 48px, rgba(80,120,160,0.04) 50px),
    repeating-linear-gradient(120deg, transparent 0, transparent 48px, rgba(80,120,160,0.03) 48px, rgba(80,120,160,0.03) 50px);
}

/* 노이즈 */
#noise {
  position: fixed; inset: 0; z-index: 1;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none;
}

/* ── 헤더 ── */
.heritage-header {
  position: sticky; top: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px 12px;
  background: rgba(8,6,4,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(201,168,76,0.08);
}
.back-btn {
  background: none; border: none;
  color: var(--gold-dim); font-size: 18px;
  cursor: pointer; padding: 4px 8px;
}
.header-title {
  font-size: 10px; letter-spacing: 0.28em;
  color: var(--gold-dim); font-weight: 400;
}
.header-season {
  font-size: 9px; letter-spacing: 0.12em;
  color: rgba(245,240,232,0.2);
  border: 1px solid rgba(201,168,76,0.15);
  border-radius: 20px; padding: 3px 10px;
}

/* ── 대관 탭 (1단계) ── */
.hall-nav {
  position: sticky; top: 49px; z-index: 190;
  display: flex; justify-content: flex-start;
  overflow-x: auto; scrollbar-width: none;
  background: rgba(8,6,4,0.9);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(201,168,76,0.06);
  padding: 0 4px;
}
.hall-nav::-webkit-scrollbar { display: none; }
.hall-tab {
  flex-shrink: 0;
  padding: 10px 14px; cursor: pointer;
  font-size: 11px; letter-spacing: 0.06em;
  color: rgba(245,240,232,0.35);
  border: none; border-bottom: 2px solid transparent;
  background: none; white-space: nowrap;
  transition: all 0.25s; font-family: inherit;
}
.hall-tab.active {
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.hall-tab .lock { font-size: 8px; margin-left: 3px; opacity: 0.5; }

/* ── 전시실 탭 (2단계) ── */
.room-nav {
  position: sticky; top: 91px; z-index: 180;
  display: flex; overflow-x: auto; scrollbar-width: none;
  background: rgba(14,11,7,0.85);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid rgba(201,168,76,0.04);
  padding: 0 8px;
  transition: opacity 0.3s;
}
.room-nav::-webkit-scrollbar { display: none; }
.room-tab {
  flex-shrink: 0;
  padding: 7px 12px; cursor: pointer;
  font-size: 10px; letter-spacing: 0.08em;
  color: rgba(245,240,232,0.25);
  border: none; border-bottom: 1.5px solid transparent;
  background: none; white-space: nowrap;
  transition: all 0.2s; font-family: inherit;
}
.room-tab.active { color: var(--gold-l); border-bottom-color: var(--gold-dim); }
.room-tab.locked { opacity: 0.4; cursor: default; }

/* ── 메인 콘텐츠 ── */
.heritage-content {
  position: relative; z-index: 10;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── 전시실 헤더 ── */
.room-header {
  text-align: center;
  padding: 28px 20px 20px;
}
.room-en {
  font-size: 8px; letter-spacing: 0.35em;
  color: var(--gold-dim); margin-bottom: 8px;
  text-transform: uppercase;
}
.room-kr {
  font-size: 22px; font-weight: 300;
  letter-spacing: 0.06em; margin-bottom: 6px;
}
.room-desc {
  font-size: 10px; color: var(--cream-dim);
  letter-spacing: 0.08em; line-height: 1.7;
}
.room-week-theme {
  display: inline-block;
  margin-top: 10px;
  font-size: 9px; letter-spacing: 0.12em;
  color: var(--gold-dim);
  border: 1px solid var(--gold-faint);
  border-radius: 20px; padding: 4px 14px;
}

/* 크림 벽 전시실 텍스트 색상 */
.is-light .room-en { color: rgba(100,70,20,0.5); }
.is-light .room-kr { color: #2A1A0A; }
.is-light .room-desc { color: rgba(60,40,20,0.55); }
.is-light .room-week-theme { color: rgba(100,70,20,0.6); border-color: rgba(100,70,20,0.2); }
.is-light .divider-line { background: linear-gradient(90deg, transparent, rgba(120,80,20,0.25), transparent); }
.is-light .divider-icon { color: rgba(120,80,20,0.4); }

/* ── 구분선 ── */
.divider {
  display: flex; align-items: center; gap: 12px;
  padding: 0 24px 20px;
}
.divider-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.2), transparent);
}
.divider-icon { font-size: 10px; color: var(--gold-dim); }

/* ── 보물 그리드 ── */
.treasure-grid {
  display: flex; flex-direction: column;
  align-items: center; gap: 60px;
  padding: 16px 28px 60px;
}

/* ── 보물 카드 ── */
.treasure-card {
  width: 100%; max-width: 300px;
  cursor: pointer;
  transition: transform 0.3s;
}
.treasure-card:active { transform: scale(0.97); }

/* 액자 이미지 — 투명 PNG 방식 */
.frame-img {
  width: 100%; height: auto;
  display: block;
  filter: drop-shadow(0 16px 40px rgba(0,0,0,0.55)) drop-shadow(0 4px 10px rgba(0,0,0,0.3));
}

/* 판매완료 — 빈 액자 */
.frame-img.sold {
  filter: drop-shadow(0 16px 40px rgba(0,0,0,0.4)) grayscale(0.6) brightness(0.7);
}

/* ── 명패 (미니멀) ── */
.treasure-label {
  margin-top: 14px;
  text-align: center;
  padding: 0 8px;
}
.label-name {
  font-size: 13px; font-weight: 500;
  color: var(--cream); letter-spacing: 0.03em;
  margin-bottom: 3px;
  line-height: 1.4;
}
.label-artist {
  font-size: 10px; color: var(--gold-dim);
  font-style: italic; margin-bottom: 2px;
}
.label-period {
  font-size: 9px; color: rgba(245,240,232,0.3);
  letter-spacing: 0.06em;
}
.label-status {
  margin-top: 6px;
  font-size: 9px; letter-spacing: 0.1em;
}
.status-available { color: rgba(201,168,76,0.7); }
.status-sold { color: rgba(245,240,232,0.3); }

/* 크림 벽 명패 */
.is-light .label-name { color: #2A1A0A; }
.is-light .label-artist { color: rgba(100,60,20,0.7); }
.is-light .label-period { color: rgba(60,40,20,0.45); }
.is-light .label-status { color: rgba(100,60,20,0.5); }
.is-light .status-available { color: rgba(120,80,20,0.8); }

/* ── 잠긴 전시실 ── */
.locked-room {
  margin: 20px 20px;
  border-radius: 8px;
  border: 1px solid rgba(201,168,76,0.1);
  background: rgba(8,6,4,0.5);
  padding: 40px 20px;
  text-align: center;
}
.lock-icon { font-size: 28px; margin-bottom: 12px; opacity: 0.4; }
.lock-title {
  font-size: 13px; font-weight: 400;
  color: rgba(245,240,232,0.35); letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.lock-desc {
  font-size: 10px; color: rgba(245,240,232,0.15);
  letter-spacing: 0.06em; line-height: 1.8;
}
.lock-date {
  margin-top: 12px; font-size: 8px;
  letter-spacing: 0.15em; color: var(--gold-dim);
  font-family: 'Courier New', monospace;
}

/* ── 모달 ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(8,6,4,0.92);
  backdrop-filter: blur(16px);
  display: flex; align-items: flex-end;
  animation: overlayIn 0.3s ease;
}
@keyframes overlayIn { from{opacity:0} to{opacity:1} }
.modal-sheet {
  width: 100%; max-height: 92vh;
  background: #1A1510;
  border-radius: 20px 20px 0 0;
  border-top: 1px solid rgba(201,168,76,0.15);
  overflow-y: auto;
  animation: sheetUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.modal-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: rgba(201,168,76,0.25);
  margin: 12px auto 0;
}
.modal-close {
  position: absolute; top: 16px; right: 20px;
  background: none; border: none;
  color: rgba(245,240,232,0.4); font-size: 20px;
  cursor: pointer; padding: 4px 8px;
  z-index: 10;
}

/* 모달 액자 이미지 */
.modal-frame {
  width: 80%; max-width: 260px;
  margin: 20px auto 0;
  display: block;
  filter: drop-shadow(0 20px 50px rgba(0,0,0,0.7));
}

/* 모달 정보 */
.modal-info {
  padding: 24px 24px 0;
  text-align: center;
}
.modal-name {
  font-size: 18px; font-weight: 500;
  color: var(--cream); letter-spacing: 0.04em;
  margin-bottom: 6px; line-height: 1.35;
}
.modal-artist {
  font-size: 12px; color: var(--gold-dim);
  font-style: italic; margin-bottom: 4px;
}
.modal-meta {
  font-size: 10px; color: rgba(245,240,232,0.35);
  letter-spacing: 0.06em; line-height: 1.7;
}

/* 모달 구분선 */
.modal-divider {
  height: 1px; margin: 20px 24px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
}

/* 모달 해설 4레이어 */
.modal-library {
  padding: 0 24px;
}
.library-section {
  margin-bottom: 20px;
}
.library-label {
  font-size: 8px; letter-spacing: 0.2em;
  color: var(--gold-dim); margin-bottom: 6px;
  text-transform: uppercase;
}
.library-text {
  font-size: 12px; color: rgba(245,240,232,0.7);
  line-height: 1.8; letter-spacing: 0.02em;
}

/* 모달 액션 버튼 */
.modal-actions {
  padding: 20px 24px 40px;
  display: flex; flex-direction: column; gap: 10px;
}
.btn-primary {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, rgba(201,168,76,0.3), rgba(201,168,76,0.1));
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 10px; color: var(--gold);
  font-size: 12px; letter-spacing: 0.14em;
  cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.btn-primary:active { background: rgba(201,168,76,0.2); }
.btn-secondary {
  width: 100%; padding: 11px;
  background: none;
  border: 1px solid rgba(245,240,232,0.1);
  border-radius: 10px; color: rgba(245,240,232,0.45);
  font-size: 11px; letter-spacing: 0.1em;
  cursor: pointer; font-family: inherit;
  text-decoration: none; text-align: center;
  display: block;
}
.btn-sold {
  width: 100%; padding: 14px;
  background: rgba(245,240,232,0.04);
  border: 1px solid rgba(245,240,232,0.08);
  border-radius: 10px; color: rgba(245,240,232,0.25);
  font-size: 11px; letter-spacing: 0.12em;
  cursor: default; font-family: inherit;
}

/* 소장자 링크 */
.owner-link {
  text-align: center; margin: 0 24px 16px;
  font-size: 10px; color: rgba(245,240,232,0.3);
  letter-spacing: 0.06em;
}
.owner-link a {
  color: var(--gold-dim);
  text-decoration: none;
}

/* ── 하단 푸터 ── */
.heritage-footer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 10px 20px 24px;
  background: linear-gradient(to top, rgba(8,6,4,0.95) 0%, transparent 100%);
  text-align: center; pointer-events: none;
}
.footer-text {
  font-size: 8px; letter-spacing: 0.18em;
  color: rgba(245,240,232,0.12);
}

/* 페이드인 */
.room-content { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="hall-bg" class="bg-dark"></div>
<div id="noise"></div>

<!-- 헤더 -->
<div class="heritage-header">
  <button class="back-btn" onclick="goHome()">←</button>
  <div class="header-title">E G  H E R I T A G E</div>
  <div class="header-season">2026 · 봄</div>
</div>

<!-- 대관 탭 (1단계) -->
<div class="hall-nav" id="hall-nav"></div>

<!-- 전시실 탭 (2단계) -->
<div class="room-nav" id="room-nav"></div>

<!-- 메인 콘텐츠 -->
<div class="heritage-content" id="heritage-content"></div>

<!-- 하단 -->
<div class="heritage-footer">
  <div class="footer-text">EG HERITAGE · 교양이 보물이 되고, 보물이 순환한다</div>
</div>

<!-- 모달 -->
<div id="modal" style="display:none"></div>

<script>
// ══════════════════════════════════════════════
// 전시관 구조 데이터
// ══════════════════════════════════════════════
const HALLS = [
  {
    id: 'renaissance',
    name: '르네상스·바로크관',
    bg: 'bg-renaissance',
    isLight: false,
    accentColor: 'rgba(220,150,40,0.8)',
    rooms: [
      { id: 'italy_renaissance', name: '이탈리아 르네상스실', en: 'Italian Renaissance', desc: '15~16세기 · 인간의 재발견', theme: '인체와 신성의 경계' },
      { id: 'north_renaissance', name: '북유럽 르네상스실',   en: 'Northern Renaissance', desc: '15~16세기 · 빛과 디테일', theme: '일상 속의 영원' },

        knowledge: '야상곡(Nocturne)이라는 장르를 피아노 음악으로 완성한 작품입니다. 아일랜드 작곡가 존 필드가 창안한 형식을 쇼팽이 완전히 자신의 것으로 만들었습니다.',
        thought: '이 곡을 들으면 잠들지 않게 됩니다. "야상곡"인데도. 어쩌면 쇼팽은 밤의 고요가 아니라 밤의 각성을 그린 것인지도 모릅니다.',
        connection: '쇼팽은 파리 살롱 문화의 중심에 있었습니다. 조르주 상드와의 사랑, 폴란드 망명자의 슬픔, 결핵의 그림자. 이 짧은 곡 안에 모든 것이 있습니다.',
        curation: '🎵 Maria João Pires 연주 / 📖 다리우스 밀요 《음악의 언어》 / 🎬 영화 《피아니스트》',
      }
    },
  ],
  modern_jazz: [],

  // 나머지 전시실은 기본값 (빈 배열)
  early_modern: [], late_modern: [], contemporary: [],
  ancient_egypt: [], greece_rome: [], medieval: [],
  east_asia: [], islamic: [], india_sea: [],
  arch_ancient: [], arch_modern: [], arch_contemp: [],
};

// ══════════════════════════════════════════════
// 상태 관리
// ══════════════════════════════════════════════
let currentHall = HALLS[0];
let currentRoom = HALLS[0].rooms[0];

// ══════════════════════════════════════════════
// 네비게이션 렌더
// ══════════════════════════════════════════════
function renderHallNav() {
  const nav = document.getElementById('hall-nav');
  nav.innerHTML = HALLS.map(h => `
    <button class="hall-tab ${h.id === currentHall.id ? 'active' : ''}"
      onclick="switchHall('${h.id}')">
      ${h.name}
    </button>
  `).join('');
}

function renderRoomNav() {
  const nav = document.getElementById('room-nav');
  nav.innerHTML = currentHall.rooms.map(r => `
    <button class="room-tab ${r.id === currentRoom.id ? 'active' : ''}"
      onclick="switchRoom('${r.id}')">
      ${r.name}
    </button>
  `).join('');
}

// ══════════════════════════════════════════════
// 전시실 전환
// ══════════════════════════════════════════════
function switchHall(hallId) {
  currentHall = HALLS.find(h => h.id === hallId);
  currentRoom = currentHall.rooms[0];

  // 배경 전환
  const bg = document.getElementById('hall-bg');
  bg.style.opacity = '0';
  setTimeout(() => {
    bg.className = currentHall.bg;
    bg.style.opacity = '1';
  }, 300);

  // 크림 벽 처리
  const content = document.getElementById('heritage-content');
  if (currentHall.isLight) {
    content.classList.add('is-light');
    document.body.style.background = '#DDD4BF';
  } else {
    content.classList.remove('is-light');
    document.body.style.background = '';
  }

  // 네비 탭 — 밝은 관일 때 조정
  const hallNav = document.getElementById('hall-nav');
  const roomNav = document.getElementById('room-nav');
  if (currentHall.isLight) {
    hallNav.style.background = 'rgba(220,210,190,0.95)';
    roomNav.style.background = 'rgba(210,200,178,0.9)';
  } else {
    hallNav.style.background = '';
    roomNav.style.background = '';
  }

  renderHallNav();
  renderRoomNav();
  renderCurrentRoom();
  window.scrollTo(0, 0);
}

function switchRoom(roomId) {
  currentRoom = currentHall.rooms.find(r => r.id === roomId);
  renderRoomNav();
  renderCurrentRoom();
  window.scrollTo(0, 0);
}

// ══════════════════════════════════════════════
// 전시실 콘텐츠 렌더
// ══════════════════════════════════════════════
function renderCurrentRoom() {
  const content = document.getElementById('heritage-content');
  const items = TREASURES[currentRoom.id] || [];

  let html = `<div class="room-content">
    <div class="room-header">
      <div class="room-en">${currentRoom.en}</div>
      <div class="room-kr">${currentRoom.name}</div>
      <div class="room-desc">${currentRoom.desc}</div>
      ${currentRoom.theme ? `<div class="room-week-theme">✦ 이번 주 · ${currentRoom.theme}</div>` : ''}
    </div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-icon">✦</div>
      <div class="divider-line"></div>
    </div>`;

  if (items.length === 0) {
    html += renderEmptyRoom();
  } else {
    html += `<div class="treasure-grid">`;
    items.forEach(item => {
      html += renderTreasureCard(item);
    });
    html += `</div>`;
  }

  html += `</div>`;
  content.innerHTML = html;
}

function renderTreasureCard(item) {
  const isSold = item.status === 'sold';
  return `
    <div class="treasure-card" onclick="openModal('${item.id}')">
      <img class="frame-img ${isSold ? 'sold' : ''}"
        src="${item.img}"
        alt="${item.name}"
        onerror="this.style.opacity='0.3'">
      <div class="treasure-label">
        <div class="label-name">${item.name}</div>
        <div class="label-artist">${item.artist}</div>
        <div class="label-period">${item.period}</div>
        <div class="label-status ${isSold ? 'status-sold' : 'status-available'}">
          ${isSold ? `📍 ${item.owner} 소장 중` : '✦ 소장 가능'}
        </div>
      </div>
    </div>`;
}

function renderEmptyRoom() {
  return `
    <div class="locked-room">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">${currentRoom.name}</div>
      <div class="lock-desc">
        이 전시실은 준비 중입니다.<br>
        곧 새로운 보물들이 걸릴 예정입니다.
      </div>
      <div class="lock-date">COMING SOON · 2026 여름 시즌</div>
    </div>`;
}

// ══════════════════════════════════════════════
// 모달
// ══════════════════════════════════════════════
function openModal(itemId) {
  // 전체 보물 목록에서 찾기
  let item = null;
  for (const key of Object.keys(TREASURES)) {
    const found = TREASURES[key].find(t => t.id === itemId);
    if (found) { item = found; break; }
  }
  if (!item) return;

  const isSold = item.status === 'sold';
  const lib = item.library || {};

  const html = `
    <div class="modal-overlay" onclick="closeModalOutside(event)">
      <div class="modal-sheet">
        <div class="modal-handle"></div>
        <button class="modal-close" onclick="closeModal()">×</button>

        <img class="modal-frame"
          src="${item.img}" alt="${item.name}"
          onerror="this.style.opacity='0.3'">

        <div class="modal-info">
          <div class="modal-name">${item.name}</div>
          <div class="modal-artist">${item.artist}</div>
          <div class="modal-meta">
            ${item.period} &nbsp;·&nbsp; ${item.origin}
          </div>
        </div>

        <div class="modal-divider"></div>

        <div class="modal-library">
          ${lib.knowledge ? `
            <div class="library-section">
              <div class="library-label">📚 지식 — 역사적 맥락</div>
              <div class="library-text">${lib.knowledge}</div>
            </div>` : ''}
          ${lib.thought ? `
            <div class="library-section">
              <div class="library-label">💭 사유 — 다른 시각</div>
              <div class="library-text">${lib.thought}</div>
            </div>` : ''}
          ${lib.connection ? `
            <div class="library-section">
              <div class="library-label">🔗 연결 — 꼬리물기</div>
              <div class="library-text">${lib.connection}</div>
            </div>` : ''}
          ${lib.curation ? `
            <div class="library-section">
              <div class="library-label">✨ 큐레이션</div>
              <div class="library-text">${lib.curation}</div>
            </div>` : ''}
        </div>

        <div class="modal-divider"></div>

        ${isSold && item.owner ? `
          <div class="owner-link">
            현재 <a href="#">${item.owner}</a>의 분더카머에 소장 중입니다
          </div>` : ''}

        <div class="modal-actions">
          ${isSold
            ? `<div class="btn-sold">📍 판매 완료 — 분더카머에서 감상하세요</div>`
            : `<button class="btn-primary" onclick="openBid('${item.id}')">🍎 황금사과로 입찰하기</button>`
          }
          ${item.source_url ? `
            <a class="btn-secondary" href="${item.source_url}" target="_blank">
              🔗 원본 감상 · 외부 링크
            </a>` : ''}
        </div>
      </div>
    </div>`;

  const modal = document.getElementById('modal');
  modal.innerHTML = html;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target.classList.contains('modal-overlay')) closeModal();
}

function openBid(id) {
  alert('입찰 기능은 준비 중입니다 🍎\n베타 오픈 후 활성화됩니다.');
}

// ══════════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════════
function goHome() {
  window.location.href = '/eungyo-salon/';
}

renderHallNav();
renderRoomNav();
renderCurrentRoom();
</script>
</body>
</html>
