<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EG뮤세움</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-dim: rgba(201,168,76,0.4);
    --chalk: #F8F4EE;
    --ink: #1A0F04;
    --wood: #2A1A08;
    --wood-dark: #120D06;
  }

  body {
    background: var(--wood-dark);
    font-family: 'Noto Serif KR', Georgia, serif;
    color: var(--chalk);
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  .museum-header {
    background: var(--wood-dark);
    border-bottom: 1px solid var(--gold-dim);
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .museum-header-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--gold);
  }
  .museum-header-sub {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: rgba(248,244,238,0.3);
    margin-top: 2px;
  }
  .museum-total {
    font-size: 11px;
    color: rgba(201,168,76,0.5);
    font-family: 'Courier New', monospace;
  }

  /* ── 서가 컨테이너 ── */
  .bookshelf-container {
    padding: 0 0 40px;
    max-width: 640px;
    margin: 0 auto;
  }

  /* ── 카테고리 행 ── */
  .shelf-row {
    position: relative;
    margin-bottom: 2px;
  }

  /* 카테고리 레이블 */
  .shelf-label {
    padding: 14px 20px 6px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .shelf-cat-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.05em;
  }
  .shelf-cat-sub {
    font-size: 10px;
    color: rgba(248,244,238,0.3);
    letter-spacing: 0.1em;
  }
  .shelf-cat-count {
    font-size: 9px;
    color: rgba(201,168,76,0.35);
    font-family: 'Courier New', monospace;
    margin-left: auto;
  }

  /* 책 스크롤 영역 */
  .shelf-books {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    padding: 0 20px 0;
    overflow-x: auto;
    scrollbar-width: none;
    position: relative;
    min-height: 140px;
  }
  .shelf-books::-webkit-scrollbar { display: none; }

  /* 책 아이템 */
  .book-item {
    flex-shrink: 0;
    position: relative;
    cursor: pointer;
    transition: transform 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .book-item:hover {
    transform: translateY(-10px);
  }

  .book-img {
    display: block;
    height: var(--book-h, 130px);
    width: auto;
    max-width: 52px;
    min-width: 28px;
    object-fit: cover;
    border-radius: 1px 3px 3px 1px;
  }

  /* 책 등 텍스트 */
  .book-text {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 9px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.08em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.95), 0 0 8px rgba(0,0,0,0.8);
    padding: 8px 2px;
    line-height: 1.2;
    overflow: hidden;
    pointer-events: none;
  }

  /* 진행도 점 */
  .book-progress {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 2px;
  }
  .progress-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.8;
  }

  /* 완독 별 */
  .book-star {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    filter: drop-shadow(0 0 4px rgba(201,168,76,0.8));
  }

  /* 빈 서가 */
  .shelf-empty {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 20px 0 12px;
    opacity: 0.4;
  }
  .empty-line {
    height: 1px;
    background: rgba(201,168,76,0.2);
    flex: 1;
  }
  .empty-text {
    font-size: 10px;
    color: rgba(248,244,238,0.3);
    letter-spacing: 0.12em;
    font-style: italic;
    white-space: nowrap;
  }

  /* 더보기 버튼 */
  .more-btn {
    flex-shrink: 0;
    align-self: center;
    padding: 6px 12px;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 20px;
    background: rgba(201,168,76,0.06);
    color: rgba(201,168,76,0.6);
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Noto Serif KR', serif;
    margin-left: 6px;
    transition: all 0.15s;
  }
  .more-btn:hover {
    background: rgba(201,168,76,0.12);
    color: var(--gold);
  }

  /* 선반 나무 */
  .shelf-wood {
    height: 6px;
    background: linear-gradient(to bottom, #3D2A0E, #2A1A08);
    margin: 4px 20px 16px;
    border-radius: 1px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  /* ── 책장 배경 ── */
  .bookshelf-bg {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url('/eungyo-salon/bookself.png');
    background-size: cover;
    background-position: center top;
    opacity: 0.28;
    pointer-events: none;
    z-index: 0;
  }
  .bookshelf-container {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
  }
  .museum-header {
    position: sticky;
    top: 0;
    z-index: 100;
  }

  /* ── 카테고리 상세 뷰 ── */
  .category-detail {
    display: none;
    position: fixed;
    inset: 0;
    background: #180E04;
    z-index: 200;
    overflow-y: auto;
    animation: slideIn 0.3s ease;
  }
  .category-detail.open { display: block; }
  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  .detail-header {
    background: #120D06;
    border-bottom: 1px solid var(--gold-dim);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .detail-back {
    font-size: 18px;
    color: var(--gold);
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }
  .detail-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--gold);
    letter-spacing: 0.1em;
  }

  /* 세부 서재 — 선반 줄바꿈 구조 */
  .detail-shelf-wrap {
    padding: 16px 0 40px;
  }
  .detail-shelf-row {
    margin-bottom: 4px;
  }
  .detail-shelf-books {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    padding: 0 16px;
    min-height: 150px;
    flex-wrap: nowrap;
    overflow-x: visible;
  }
  .detail-shelf-wood {
    height: 8px;
    background: linear-gradient(to bottom, #5C3D1A, #3D2A0E, #2A1A08);
    margin: 2px 16px 20px;
    border-radius: 2px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.6);
  }

  /* ── 책 페이지 넘기기 모달 ── */
  .book-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,5,2,0.92);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.3s ease;
  }
  .book-modal-overlay.open { display: flex; }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .book-modal {
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    position: relative;
    animation: bookOpen 0.4s ease;
    overflow: hidden;
    border-radius: 2px 12px 12px 2px;
  }
  @keyframes bookOpen {
    from { opacity: 0; transform: scale(0.92) rotateY(-8deg); }
    to   { opacity: 1; transform: scale(1) rotateY(0deg); }
  }

  /* 페이지 */
  .book-page-view {
    display: none;
    width: 100%;
    border-radius: 2px 12px 12px 2px;
    overflow: hidden;
    box-shadow: -6px 0 0 #1A0F04, 8px 6px 32px rgba(0,0,0,0.8);
  }
  .book-page-view.active {
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 2;
    height: 460px;
    overflow: hidden;
  }
  /* 슬라이드 아웃 — absolute로 겹치지 않게 */
  .book-page-view.slide-out-left,
  .book-page-view.slide-out-right {
    display: block;
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 1;
    pointer-events: none;
  }
  .book-page-view.slide-out-left {
    animation: slideOutLeft 0.28s ease forwards;
  }
  .book-page-view.slide-out-right {
    animation: slideOutRight 0.28s ease forwards;
  }

  /* 슬라이드 인 — 다음 */
  .book-page-view.slide-in-right {
    animation: slideInRight 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  /* 슬라이드 인 — 이전 */
  .book-page-view.slide-in-left {
    animation: slideInLeft 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  /* 슬라이드 아웃 — 다음 */
  .book-page-view.slide-out-left {
    display: block;
    animation: slideOutLeft 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }
  /* 슬라이드 아웃 — 이전 */
  .book-page-view.slide-out-right {
    display: block;
    animation: slideOutRight 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
  }

  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(60px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-60px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideOutLeft {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(-60px); }
  }
  @keyframes slideOutRight {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(60px); }
  }

  /* 표지 */
  .page-cover {
    background: #1E1108;
    border-left: 10px solid #120D04;
    height: 460px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 40px 28px 32px;
    position: relative;
    overflow: hidden;
  }
  .page-cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
    );
  }
  .cover-content { position: relative; }
  .cover-cat-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(201,168,76,0.5);
    font-family: 'Courier New', monospace;
    margin-bottom: 20px;
  }
  .cover-main-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 28px;
    font-weight: 600;
    color: #F8F4EE;
    line-height: 1.3;
    margin-bottom: 16px;
  }
  .cover-divider {
    width: 40px; height: 1px;
    background: rgba(201,168,76,0.3);
    margin-bottom: 16px;
  }
  .cover-keyword-text {
    font-size: 12px;
    color: rgba(248,244,238,0.35);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    line-height: 1.7;
  }
  .cover-footer { position: relative; display: flex; align-items: center; justify-content: space-between; }
  .cover-eg {
    width: 40px; height: 40px;
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: rgba(201,168,76,0.4);
    font-family: 'Cormorant Garamond', serif;
  }
  .cover-num {
    font-size: 9px;
    color: rgba(201,168,76,0.25);
    font-family: 'Courier New', monospace;
    letter-spacing: 0.15em;
  }

  /* 내지 */
  .page-inner {
    background: #F7F2E8;
    border-left: 10px solid #E8E0CC;
    position: relative;
    overflow-y: auto;
    height: 100%;
  }
  .page-lines {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 27px,
      rgba(180,160,120,0.12) 27px, rgba(180,160,120,0.12) 28px
    );
    pointer-events: none;
  }
  .page-inner-content {
    position: relative;
    padding: 32px 24px 48px;
  }
  .page-layer-tag {
    font-size: 8px;
    letter-spacing: 0.25em;
    color: rgba(100,80,40,0.4);
    font-family: 'Courier New', monospace;
    border-bottom: 1px solid rgba(180,160,120,0.2);
    padding-bottom: 10px;
    margin-bottom: 16px;
  }
  .page-layer-heading {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 17px;
    color: #2A1F0A;
    font-weight: 600;
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .page-layer-body {
    font-size: 13px;
    color: #3D2F10;
    font-family: 'Noto Serif KR', Georgia, serif;
    line-height: 2.0;
  }
  .page-corner {
    position: absolute;
    bottom: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 0 28px 28px;
    border-color: transparent transparent #E8E0CC transparent;
    opacity: 0.5;
  }
  .page-num-inner {
    position: absolute;
    bottom: 14px; right: 36px;
    font-size: 10px;
    color: rgba(100,80,40,0.3);
    font-family: 'Courier New', monospace;
  }

  /* 필레몬 페이지 */
  .page-philemon {
    background: #F0EBE0;
    border-left: 10px solid #DDD5BB;
    position: relative;
    overflow-y: auto;
    height: 100%;
  }
  .letter-wrap {
    margin: 24px 20px;
    background: #FFFDF5;
    border: 1px solid rgba(180,160,120,0.25);
    border-radius: 2px;
    padding: 22px;
    position: relative;
  }
  .letter-lines-bg {
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      0deg, transparent, transparent 23px,
      rgba(180,160,120,0.12) 23px, rgba(180,160,120,0.12) 24px
    );
    border-radius: 2px;
    pointer-events: none;
  }
  .letter-text {
    position: relative;
    font-family: 'Noto Serif KR', Georgia, serif;
    font-size: 13px;
    color: #2A1F0A;
    line-height: 2.1;
  }
  .letter-sig {
    font-size: 10px;
    color: rgba(100,80,40,0.4);
    margin-top: 20px;
    font-family: 'Courier New', monospace;
    letter-spacing: 0.1em;
  }

  #bookPages {
    flex: 1;
    overflow: hidden;
    min-height: 0;
    position: relative;
  }
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    padding: 0 2px;
    flex-shrink: 0;
  }
  .book-nav-btn {
    padding: 9px 20px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.2);
    background: rgba(201,168,76,0.06);
    color: rgba(201,168,76,0.7);
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Serif KR', serif;
    transition: all 0.15s;
  }
  .book-nav-btn:hover { background: rgba(201,168,76,0.12); color: #C9A84C; }
  .book-nav-btn:disabled { opacity: 0.2; cursor: default; }
  .book-page-dots {
    display: flex; gap: 5px;
  }
  .book-page-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(201,168,76,0.2);
    transition: all 0.2s;
  }
  .book-page-dot.active {
    background: rgba(201,168,76,0.8);
    width: 14px;
    border-radius: 3px;
  }
  .book-close-btn {
    position: absolute;
    top: -12px; right: -4px;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.3);
    background: rgba(18,13,6,0.9);
    color: rgba(201,168,76,0.7);
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .bgm-control {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 300;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--gold-dim);
    background: rgba(18,13,6,0.8);
    color: var(--gold);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }
  .bgm-control:hover { background: rgba(201,168,76,0.1); }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<body>

<!-- 책장 배경 레이어 -->
<div class="bookshelf-bg"></div>

<!-- 책 페이지 넘기기 모달 -->
<div class="book-modal-overlay" id="bookModalOverlay" onclick="handleOverlayClick(event)">
  <div class="book-modal" id="bookModal">
    <button class="book-close-btn" onclick="closeBook()">×</button>

    <!-- 페이지들 -->
    <div id="bookPages"></div>

    <!-- 네비게이션 -->
    <div class="book-nav">
      <button class="book-nav-btn" id="bookPrevBtn" onclick="turnPage(-1)" disabled>← 이전</button>
      <div class="book-page-dots" id="bookDots"></div>
      <button class="book-nav-btn" id="bookNextBtn" onclick="turnPage(1)">다음 →</button>
    </div>
  </div>
</div>

<!-- BGM -->
<audio id="museumBGM" loop></audio>
<button class="bgm-control" id="bgmBtn" onclick="toggleBGM()" title="음악 켜기/끄기">🎵</button>

<!-- 헤더 -->
<div class="museum-header">
  <div style="display:flex;align-items:center;gap:12px">
    <button onclick="goHome()" style="background:none;border:none;color:rgba(201,168,76,0.6);font-size:18px;cursor:pointer;padding:4px">←</button>
    <div>
      <div class="museum-header-title">EG 뮤세움</div>
      <div class="museum-header-sub">나만의 교양 서재</div>
    </div>
  </div>
  <div class="museum-total" id="totalCount">0권</div>
</div>

<!-- 서가 -->
<div class="bookshelf-container" id="bookshelfContainer"></div>

<!-- 카테고리 상세 -->
<div class="category-detail" id="categoryDetail">
  <div class="detail-header">
    <button class="detail-back" onclick="closeDetail()">←</button>
    <div>
      <div class="detail-title" id="detailTitle"></div>
      <div style="font-size:10px;color:rgba(248,244,238,0.3);letter-spacing:0.1em" id="detailSub"></div>
    </div>
  </div>
  <div class="detail-shelf-wrap" id="detailShelfWrap"></div>
</div>

<script>
const BASE = '/eungyo-salon/';

// ── Supabase 전역 클라이언트 (index.html과 동일 설정) ──
const SUPA_URL = 'https://cyhlotwdisjvoxvfkpnd.supabase.co';
const SUPA_KEY = 'sb_publishable_jYYfQV_wQgMRFjSUuDq7xA_gWc9vsnR';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY, {
  auth: {
    persistSession: true,
    autoRefreshToken: true,
    storageKey: 'eungyo-auth',
  }
});
const BOOK_IMAGES = ['book01','book02','book03','book04','book05','book06','book07','book08','book09','book10'];
const PREVIEW_MAX = 15;
const BOOKS_PER_SHELF = 12; // 세부 서재 한 선반당 권수

// ── BGM ──────────────────────────────────────
const BGM_COUNT = 12;
let bgmPlaying = false;
const bgmAudio = document.getElementById('museumBGM');

// 랜덤 곡 한 번만 선택 (페이지 로드 시 고정)
const bgmIdx = Math.floor(Math.random() * BGM_COUNT) + 1;
bgmAudio.src = BASE + 'muse_bgm_' + String(bgmIdx).padStart(2,'0') + '.mp3';
bgmAudio.volume = 0.18;
bgmAudio.loop = true;

function initBGM() {
  bgmAudio.play().then(() => {
    bgmPlaying = true;
    document.getElementById('bgmBtn').textContent = '🎵';
  }).catch(() => {
    bgmPlaying = false;
    document.getElementById('bgmBtn').textContent = '🔇';
  });
}

function goHome() {
  // BGM 완전 정지 후 홈으로 이동
  bgmAudio.pause();
  bgmAudio.currentTime = 0;
  bgmAudio.src = '';  // 오디오 소스 완전 제거
  bgmPlaying = false;
  window.location.href = '/eungyo-salon/';
}

function toggleBGM() {
  if (bgmPlaying) {
    bgmAudio.pause();
    bgmPlaying = false;
    document.getElementById('bgmBtn').textContent = '🔇';
  } else {
    bgmAudio.play();
    bgmPlaying = true;
    document.getElementById('bgmBtn').textContent = '🎵';
  }
}

// ── 카테고리 ──────────────────────────────────
const CATEGORIES = [
  { id: 'lit',    name: '문학',   sub: '종이 위의 인간' },
  { id: 'phi',    name: '철학',   sub: '생각의 탄생' },
  { id: 'his',    name: '역사',   sub: '시간의 지층' },
  { id: 'art',    name: '예술',   sub: '아름다움의 형식' },
  { id: 'myth',   name: '신화',   sub: '신들의 정원' },
  { id: 'sci',    name: '과학',   sub: '우주의 문법' },
  { id: 'inner',  name: '내면',   sub: '마음의 풍경' },
  { id: 'power',  name: '사회',   sub: '권력과 연대' },
  { id: 'spirit', name: '영성',   sub: '신과 인간' },
  { id: 'eco',    name: '생태',   sub: '자연의 질서' },
  { id: 'geo',    name: '지리',   sub: '도시와 장소' },
  { id: 'food',   name: '음식',   sub: '삶의 맛' },
];

// 샘플 책 데이터 (최신순 — 인덱스 0이 가장 최신)
// ── 카테고리 매핑 ──────────────────────────────
const CAT_MAP = {
  'lit':    ['문학'],
  'phi':    ['철학'],
  'his':    ['역사'],
  'art':    ['예술'],
  'myth':   ['신화'],
  'sci':    ['자연과학', '우주의 문법'],
  'inner':  ['내면', '생각의 탄생'],
  'power':  ['권력', '사회'],
  'spirit': ['영성', '종교'],
  'eco':    ['생태', '자연'],
  'geo':    ['지리', '도시'],
  'food':   ['삶의 맛', '음식', '일상'],
};

function getCatId(categoryStr) {
  const c = categoryStr || '';
  for (const [id, keywords] of Object.entries(CAT_MAP)) {
    if (keywords.some(k => c.includes(k))) return id;
  }
  return 'lit';
}

// ── questions JSON → 82권 변환 ──────────────────
let ALL_BOOKS = {}; // catId → [{answer, keyword, category, library, solved}]
let BOOKS_LOADED = false;

async function loadMuseumBooks() {
  // 전역 supa 클라이언트 사용

  // 1. 내가 경험한 quiz_log 가져오기
  let myAnswers = new Set();
  try {
    const { data: { session } } = await supa.auth.getSession();
    console.log('뮤세움 세션:', session ? session.user.email : '없음');
    if (session) {
      const { data: logs, error } = await supa
        .from('quiz_log')
        .select('answer')
        .eq('uid', session.user.id);
      console.log('quiz_log 조회:', logs ? logs.length + '건' : '실패', error);
      if (logs) logs.forEach(r => myAnswers.add(r.answer));
    }
  } catch(e) {
    console.warn('quiz_log 로드 실패:', e);
  }

  // 2. 전체 씨앗 JSON에서 책 정보 로드
  // 씨앗 목록 자동 감지 — questions_index.json 우선, 없으면 알려진 목록 사용
  let seeds = [];
  try {
    const idxRes = await fetch(BASE_URL + 'questions_index.json');
    if (idxRes.ok) {
      const idx = await idxRes.json();
      seeds = idx.files || [];
      console.log('questions_index.json에서 씨앗 목록 로드:', seeds.length + '개');
    }
  } catch(e) {}

  // questions_index.json 없으면 알려진 씨앗 목록 사용
  if (seeds.length === 0) {
    seeds = [
      'questions_taeyang.json', 'questions_gil.json',
      'questions_bada.json',    'questions_terra.json',
      'questions_bam.json',     'questions_bul.json',
      'questions_dol.json',     'questions_namu.json',
      'questions_baram.json',   'questions_geoul.json',
      'questions_mun.json',
    ];
  }

  const BASE_URL = '/eungyo-salon/';
  const bookMap = {};

  for (const seed of seeds) {
    try {
      const res = await fetch(BASE_URL + seed);
      const data = await res.json();
      const questions = data.questions || data;
      for (const q of questions) {
        const key = q.answer;
        if (!bookMap[key]) {
          bookMap[key] = {
            answer:   q.answer,
            keyword:  q.keyword  || '',
            category: q.category || '',
            catId:    getCatId(q.category),
            library:  q.library  || {},
            solved:   0,
            // 내가 경험한 책인지 여부
            mine: myAnswers.has(q.answer),
          };
        }
      }
    } catch(e) {
      console.warn('씨앗 로드 실패:', seed, e);
    }
  }

  // 3. 내가 경험한 책만 catId별로 분류
  ALL_BOOKS = {};
  CATEGORIES.forEach(cat => ALL_BOOKS[cat.id] = []);
  for (const book of Object.values(bookMap)) {
    if (book.mine && ALL_BOOKS[book.catId]) {
      ALL_BOOKS[book.catId].push(book);
    }
  }

  BOOKS_LOADED = true;
  const total = Object.values(ALL_BOOKS).reduce((s, arr) => s + arr.length, 0);
  console.log('뮤세움 내 책 로드 완료:', total + '권 (전체 중 경험한 것만)');

  // 경험한 책이 하나도 없으면 안내 메시지
  if (total === 0) {
    document.getElementById('bookshelfContainer').innerHTML = `
      <div style="padding:60px 24px;text-align:center;color:rgba(248,244,238,0.3)">
        <div style="font-size:40px;margin-bottom:16px">📚</div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:18px;color:rgba(201,168,76,0.5);margin-bottom:10px">
          아직 서재가 비어있습니다
        </div>
        <div style="font-size:12px;line-height:2">
          퀴즈를 플레이하면<br>만난 문제들이 이곳에 책으로 꽂힙니다
        </div>
      </div>`;
    document.getElementById('totalCount').textContent = '0권';
    return;
  }

  renderShelf();
}

// ── 유틸 ──────────────────────────────────────
function getBookImg(answer) {
  let hash = 0;
  for (let c of answer) hash = (hash * 31 + c.charCodeAt(0)) & 0xfffff;
  return BOOK_IMAGES[hash % BOOK_IMAGES.length];
}

function getBookHeight(answer) {
  let hash = 0;
  for (let c of answer) hash = (hash * 17 + c.charCodeAt(0)) & 0xfffff;
  const heights = [110, 118, 125, 130, 135, 140, 128, 122, 115, 132];
  return heights[hash % heights.length];
}

function makeBookEl(book) {
  const img = book.img || getBookImg(book.answer);
  const h = getBookHeight(book.answer);
  const div = document.createElement('div');
  div.className = 'book-item';
  div.onclick = () => openBook(book);

  const imgEl = document.createElement('img');
  imgEl.className = 'book-img';
  imgEl.src = BASE + img + '.png';
  imgEl.style.height = h + 'px';
  imgEl.alt = book.answer;

  const textEl = document.createElement('div');
  textEl.className = 'book-text';
  textEl.textContent = book.answer;

  div.appendChild(imgEl);
  div.appendChild(textEl);

  // 진행도 점
  if (book.solved >= 1) {
    const prog = document.createElement('div');
    prog.className = 'book-progress';
    for (let i = 0; i < Math.min(book.solved, 3); i++) {
      const dot = document.createElement('div');
      dot.className = 'progress-dot';
      prog.appendChild(dot);
    }
    div.appendChild(prog);
  }

  // 완독 별
  if (book.solved >= 3) {
    const star = document.createElement('div');
    star.className = 'book-star';
    star.textContent = '⭐';
    div.appendChild(star);
  }

  return div;
}

// ── 메인 서가 렌더 ────────────────────────────
function renderShelf() {
  const container = document.getElementById('bookshelfContainer');
  container.innerHTML = '';
  let totalBooks = 0;

  CATEGORIES.forEach(cat => {
    const books = ALL_BOOKS[cat.id] || [];
    totalBooks += books.length;

    const row = document.createElement('div');
    row.className = 'shelf-row';

    const label = document.createElement('div');
    label.className = 'shelf-label';
    label.innerHTML = `
      <span class="shelf-cat-name">${cat.name}</span>
      <span class="shelf-cat-sub">${cat.sub}</span>
      <span class="shelf-cat-count">${books.length}권</span>
    `;
    row.appendChild(label);

    const shelfEl = document.createElement('div');
    shelfEl.className = 'shelf-books';

    if (books.length === 0) {
      shelfEl.innerHTML = `
        <div class="shelf-empty">
          <div class="empty-line"></div>
          <span class="empty-text">아직 탐험하지 않은 영역</span>
          <div class="empty-line"></div>
        </div>
      `;
    } else {
      // 최신순 (인덱스 0이 최신) — 왼쪽부터
      const preview = books.slice(0, PREVIEW_MAX);
      preview.forEach(book => shelfEl.appendChild(makeBookEl(book)));

      if (books.length > PREVIEW_MAX) {
        const btn = document.createElement('button');
        btn.className = 'more-btn';
        btn.textContent = `→ 더보기 (총 ${books.length}권)`;
        btn.onclick = (e) => { e.stopPropagation(); openDetail(cat, books); };
        shelfEl.appendChild(btn);
      }
    }

    row.appendChild(shelfEl);

    const wood = document.createElement('div');
    wood.className = 'shelf-wood';
    row.appendChild(wood);

    container.appendChild(row);
  });

  document.getElementById('totalCount').textContent = totalBooks + '권';
}

// ── 카테고리 세부 서재 ────────────────────────
function openDetail(cat, books) {
  document.getElementById('detailTitle').textContent = cat.name + ' · ' + cat.sub;
  document.getElementById('detailSub').textContent = '총 ' + books.length + '권';

  const wrap = document.getElementById('detailShelfWrap');
  wrap.innerHTML = '';

  // 선반 단위로 분할 (BOOKS_PER_SHELF개씩)
  const chunks = [];
  for (let i = 0; i < books.length; i += BOOKS_PER_SHELF) {
    chunks.push(books.slice(i, i + BOOKS_PER_SHELF));
  }

  chunks.forEach((chunk, rowIdx) => {
    const shelfRow = document.createElement('div');
    shelfRow.className = 'detail-shelf-row';

    const booksEl = document.createElement('div');
    booksEl.className = 'detail-shelf-books';
    chunk.forEach(book => booksEl.appendChild(makeBookEl(book)));
    shelfRow.appendChild(booksEl);

    const wood = document.createElement('div');
    wood.className = 'detail-shelf-wood';
    shelfRow.appendChild(wood);

    wrap.appendChild(shelfRow);
  });

  document.getElementById('categoryDetail').classList.add('open');
}

function closeDetail() {
  document.getElementById('categoryDetail').classList.remove('open');
}

// ── 책 페이지 넘기기 ──────────────────────────
let currentPage = 0;
let totalPages = 0;

function openBook(book) {
  currentPage = 0;
  const lib = book.library || {};
  const pages = buildPages(book, lib);
  totalPages = pages.length;

  const pagesEl = document.getElementById('bookPages');
  pagesEl.innerHTML = '';
  pages.forEach((p, i) => {
    p.style.display = ''; // display 초기화
    p.classList.toggle('active', i === 0);
    pagesEl.appendChild(p);
  });

  renderDots();
  document.getElementById('bookPrevBtn').disabled = true;
  document.getElementById('bookNextBtn').disabled = totalPages <= 1;
  document.getElementById('bookModalOverlay').classList.add('open');
}

function buildPages(book, lib) {
  const pages = [];

  // 1. 표지
  const cover = document.createElement('div');
  cover.className = 'book-page-view page-cover';
  cover.innerHTML = `
    <div class="cover-content">
      <div class="cover-cat-label">${book.category || '문학 · 종이 위의 인간'}</div>
      <div class="cover-main-title">${book.answer}</div>
      <div class="cover-divider"></div>
      <div class="cover-keyword-text">"${book.keyword || ''}"</div>
    </div>
    <div class="cover-footer">
      <div class="cover-eg">EG</div>
      <div class="cover-num">EG뮤세움</div>
    </div>
  `;
  pages.push(cover);

  // 2. 지식
  if (lib.knowledge) {
    pages.push(makeInnerPage('LAYER 1 · 지식', '알고 이해하기', lib.knowledge, pages.length + 1));
  }

  // 3. 사유
  if (lib.thought) {
    pages.push(makeInnerPage('LAYER 2 · 사유', '생각하고 느끼기', lib.thought, pages.length + 1));
  }

  // 4. 연결
  if (lib.connection) {
    pages.push(makeInnerPage('LAYER 3 · 연결', '삶과 이어보기', lib.connection, pages.length + 1));
  }

  // 5. 큐레이션
  if (lib.curation) {
    pages.push(makeCurationPage(lib.curation, pages.length + 1));
  }

  // 6. 필레몬 서신
  pages.push(makePhilemonPage(book, pages.length + 1));

  return pages;
}

function makeInnerPage(tag, heading, body, num) {
  const div = document.createElement('div');
  div.className = 'book-page-view page-inner';
  div.innerHTML = `
    <div class="page-lines"></div>
    <div class="page-inner-content">
      <div class="page-layer-tag">${tag}</div>
      <div class="page-layer-heading">${heading}</div>
      <div class="page-layer-body">${body}</div>
    </div>
    <div class="page-num-inner">${num}</div>
    <div class="page-corner"></div>
  `;
  return div;
}

function makeCurationPage(curation, num) {
  const div = document.createElement('div');
  div.className = 'book-page-view page-inner';
  // 큐레이션 텍스트를 항목별로 분리
  const items = curation.split('/').map(s => s.trim()).filter(Boolean);
  const itemsHtml = items.map(item => `
    <div style="padding:10px 0;border-bottom:1px solid rgba(180,160,120,0.15);font-size:13px;color:#3D2F10;font-family:'Noto Serif KR',serif;line-height:1.6">
      ${item}
    </div>
  `).join('');

  div.innerHTML = `
    <div class="page-lines"></div>
    <div class="page-inner-content">
      <div class="page-layer-tag">LAYER 4 · 큐레이션</div>
      <div class="page-layer-heading">더 깊이 들어가기</div>
      ${itemsHtml}
    </div>
    <div class="page-num-inner">${num}</div>
    <div class="page-corner"></div>
  `;
  return div;
}

function makePhilemonPage(book, num) {
  const div = document.createElement('div');
  div.className = 'book-page-view page-philemon';
  const today = new Date();
  const dateStr = `${today.getFullYear()}년 ${today.getMonth()+1}월`;
  div.innerHTML = `
    <div class="page-lines"></div>
    <div class="letter-wrap">
      <div class="letter-lines-bg"></div>
      <div class="letter-text">
        소로님께,<br><br>
        <em>${book.answer}</em>를 만난 날을 기억합니다.<br><br>
        이 문제를 함께 만들고, 지금 소로님의 서재에 이 책이 꽂혀있다는 것은
        그 사유가 여전히 살아있다는 뜻입니다.<br><br>
        교양은 시험이 아니라 삶의 질감입니다. 이 한 권이 소로님의 하루를
        조금 더 깊게 만들어주길 바랍니다.
        <div class="letter-sig">— 필레몬, ${dateStr}</div>
      </div>
    </div>
    <div style="position:absolute;bottom:14px;right:24px;font-size:10px;color:rgba(100,80,40,0.3);font-family:'Courier New',monospace">${num}</div>
  `;
  return div;
}

// ── 종이 넘기는 소리 (Web Audio API) ──────────
// 소로님 직접 녹음한 사그락 소리 🎵
const pageTurnAudio = new Audio(BASE + 'page_turn.mp3');
pageTurnAudio.volume = 0.7;

function playPageSound() {
  try {
    pageTurnAudio.currentTime = 0;
    pageTurnAudio.play().catch(() => {});
  } catch(e) {}
}

function turnPage(dir) {
  const pages = document.querySelectorAll('.book-page-view');
  const outPage = pages[currentPage];
  currentPage = Math.max(0, Math.min(totalPages - 1, currentPage + dir));
  const inPage = pages[currentPage];

  // 사그락 소리
  playPageSound();

  // 슬라이드 방향
  const outClass = dir > 0 ? 'slide-out-left' : 'slide-out-right';
  const inClass  = dir > 0 ? 'slide-in-right' : 'slide-in-left';

  // 아웃 페이지 — active 제거 후 슬라이드 아웃
  outPage.classList.remove('active');
  outPage.classList.add(outClass);

  // 인 페이지 — 슬라이드 인
  inPage.classList.add('active', inClass);
  inPage.scrollTop = 0;

  // 애니메이션 끝나면 완전히 정리
  setTimeout(() => {
    outPage.classList.remove(outClass);
    outPage.style.display = 'none'; // 완전히 숨김
    inPage.classList.remove(inClass);
    // 인 페이지 display 복원
    inPage.style.display = '';
  }, 300);

  document.getElementById('bookPrevBtn').disabled = currentPage === 0;
  document.getElementById('bookNextBtn').disabled = currentPage === totalPages - 1;
  renderDots();
}

function renderDots() {
  const dots = document.getElementById('bookDots');
  dots.innerHTML = '';
  for (let i = 0; i < totalPages; i++) {
    const dot = document.createElement('div');
    dot.className = 'book-page-dot' + (i === currentPage ? ' active' : '');
    dots.appendChild(dot);
  }
}

function closeBook() {
  document.getElementById('bookModalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('bookModalOverlay')) closeBook();
}

// ── 터치 스와이프 지원 ─────────────────────────
let touchStartX = 0;
let touchStartY = 0;

document.getElementById('bookModalOverlay').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('bookModalOverlay').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0) turnPage(1);  // 왼쪽 스와이프 → 다음
    else turnPage(-1);         // 오른쪽 스와이프 → 이전
  }
}, { passive: true });

// ── 시작 ──────────────────────────────────────
loadMuseumBooks();

// BGM 즉시 재생 시도 (자동재생 정책으로 실패하면 첫 클릭 시 재생)
initBGM();
if (!bgmPlaying) {
  document.addEventListener('click', function startBGM() {
    if (!bgmPlaying) initBGM();
    document.removeEventListener('click', startBGM);
  }, { once: true });
}
